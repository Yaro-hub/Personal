<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .tab-fade { position: relative; }
  .tab-fade::after { content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 32px; background: linear-gradient(to right, transparent, #1a1b1f); pointer-events: none; }
  .card-hover { transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease; }
  .card-hover:hover { border-color: rgba(127,179,211,0.3); background: rgba(127,179,211,0.05); }

  /* ── Mobile: iPhone 13 Pro Max + similar ── */

    body { -webkit-text-size-adjust: 100%; }

    /* flow card header button — bigger tap area */

      padding: 18px 16px !important;
    }
    /* input fields — taller on mobile */
    input[type="text"], input[type="number"] {
      min-height: 44px;
      font-size: 16px !important;  /* 16px prevents iOS zoom-on-focus */
    }

      font-size: 16px !important;

<script>
var wisdomSections = {
  musashi: {
    title: "Musashi's Dokkodo — 21 Precepts",
    subtitle: "Written by Miyamoto Musashi a week before his death. The distilled wisdom of an undefeated samurai who mastered the sword, brush, and mind.",
    items: [
      { title: "1. Accept everything just the way it is.", tag: "Precept 1", insight: "Radical acceptance is not passivity — it's clear perception. Until you see what IS, your strategy is built on fantasy.", note: "When a training session goes poorly, accept it without story. Respond to the data, not the story." },
      { title: "2. Do not seek pleasure for its own sake.", tag: "Precept 2", insight: "Pleasure as a byproduct of meaningful activity is healthy. Pleasure as the GOAL creates addiction.", note: "Build a life you don't need to escape from, and pleasure becomes garnish, not the meal." },
      { title: "3. Do not depend on a partial feeling.", tag: "Precept 3", insight: "Half-hearted commitment produces half-hearted results. Indecision IS a decision.", note: "A set done with full focus at RPE 9 produces more adaptation than three sets done half-heartedly." },
      { title: "4. Think lightly of yourself and deeply of the world.", tag: "Precept 4", insight: "Ego is noise. The less you think about yourself, the more bandwidth you have for the work.", note: "Self-consciousness during training or deep work is just bandwidth leakage." },
      { title: "5. Be detached from desire your whole life long.", tag: "Precept 5", insight: "Desire creates suffering when it attaches to outcomes. Want the process, not the result.", note: "Train for the training itself. The physique is a byproduct." },
      { title: "6. Do not regret what you have done.", tag: "Precept 6", insight: "Regret is mental energy spent on an unchangeable past. Extract the lesson, release the event.", note: "Every bad workout, every missed day — lesson extracted, event released." },
      { title: "7. Never be jealous.", tag: "Precept 7", insight: "Jealousy is borrowing someone else's highlight reel and using it to diminish yourself. Compare only to yesterday.", note: "The only comparison that matters: you vs. you." },
      { title: "8. Never be saddened by a separation.", tag: "Precept 8", insight: "Everything is temporary — relationships, phases, capabilities. Clinging creates suffering.", note: "Appreciate what's here while it's here. Release it when it leaves." },
      { title: "9. Resentment and complaint are for no one.", tag: "Precept 9", insight: "Resentment is drinking poison and expecting the other person to die. Complaint is rehearsal of victimhood.", note: "Neither resentment nor complaint has ever solved a single problem." },
      { title: "10. Do not be guided by lust or love.", tag: "Precept 10", insight: "Strong emotions are unreliable navigators. They're information, not commands.", note: "Feel the emotion, then make the decision from principle." },
      { title: "11. In all things have no preferences.", tag: "Precept 11", insight: "Preferences create suffering when reality doesn't match. Adapt to what IS.", note: "The workout you didn't plan for is often the one you needed most." },
      { title: "12. Be indifferent to where you live.", tag: "Precept 12", insight: "External environment matters less than internal state. Your mind is your home.", note: "You can train anywhere. The equipment doesn't create the adaptation — the effort does." },
      { title: "13. Do not pursue the taste of good food.", tag: "Precept 13", insight: "Food is fuel first, pleasure second. When pleasure becomes the primary driver, health suffers.", note: "Eat for performance. Taste is a bonus, not the objective." },
      { title: "14. Do not hold on to possessions you no longer need.", tag: "Precept 14", insight: "Physical clutter = mental clutter. Let go of what no longer serves.", note: "If you haven't used it in a year, you probably don't need it." },
      { title: "15. Do not act following customary beliefs.", tag: "Precept 15", insight: "Tradition is other people's thinking, inherited. Question everything.", note: "Every element of your training should have a 'why' grounded in mechanism, not convention." },
      { title: "16. Do not practice with weapons beyond what is useful.", tag: "Precept 16", insight: "More tools do not produce more mastery. One tool mastered beats ten tools dabbled in.", note: "Your 'weapons' are compound lifts, Zone 2, and the habit system. Depth over breadth." },
      { title: "17. Do not fear death.", tag: "Precept 17", insight: "Death is the only guaranteed event. Accepting mortality is not morbid — it's clarifying.", note: "Memento mori: remembering you will die is the most effective prioritization tool." },
      { title: "18. Do not seek possessions for your old age.", tag: "Precept 18", insight: "Hoarding for an uncertain future sacrifices the present. Build health, not storage units.", note: "The best investment in your future self is today's training session." },
      { title: "19. Respect gods without counting on their help.", tag: "Precept 19", insight: "Have reverence for something larger than yourself. But take full responsibility for outcomes.", note: "Prayer without action is wishful thinking. Action without perspective is burnout." },
      { title: "20. Abandon your body but preserve your honor.", tag: "Precept 20", insight: "The body can be sacrificed for principle. Character remains.", note: "Physical capacity fades; integrity compounds. What you stand for outlasts what you can lift." },
      { title: "21. Never stray from the Way.", tag: "Precept 21", insight: "The 'Way' is your integrated system of principles. Straying is not deviation — it's losing the commitment to return.", note: "The master is not the one who never falls — it's the one who always comes back." }
    ]
  },
  principles: {
    title: "Timeless Principles",
    subtitle: "Wisdom that transcends any single tradition — always true, always useful",
    items: [
      { title: "Hanlon's Razor", tag: "Mental Model", insight: "Never attribute to malice that which is adequately explained by incompetence or ignorance. Most harm is not intentional.", note: "When someone cuts you off in traffic, assume they're distracted, not evil. Saves enormous emotional expenditure." },
      { title: "The Obstacle is the Way", tag: "Stoic", insight: "What blocks your path IS the path. The impediment to action advances action. Every obstacle is an opportunity to practice a virtue.", note: "A bad training day is not an interruption of training — it IS training. Adapting to suboptimal conditions builds real resilience." },
      { title: "Dichotomy of Control", tag: "Stoic", insight: "Some things are up to us (judgments, actions, values). Everything else is not. Suffering comes from confusing the two.", note: "You control: your effort, your response. You don't control: results, other people, the economy, genetics." },
      { title: "Clean Your Room First", tag: "Peterson", insight: "Start with what's directly in front of you. Order the small things before claiming you can order the big ones.", note: "Before optimizing your supplement stack, make your bed. The small act of ordering your environment orders your mind." },
      { title: "Compare to Yesterday, Not Others", tag: "Goggins", insight: "The only valid comparison is you vs. your past self. Comparing to others is borrowing metrics you can't control.", note: "Someone else's progress tells you about them. Your progress tells you about your system." },
      { title: "Memento Mori", tag: "Stoic", insight: "Remember you will die. This is not morbid — it's the ultimate prioritization tool. Finite time demands ruthless prioritization.", note: "You have ~60 years remaining. Every day is ~0.005% of your remaining life. Spend it accordingly." },
      { title: "What You Resist Persists", tag: "Psychology", insight: "Avoidance strengthens the avoided thing. Facing it dissolves it. Lean into discomfort deliberately.", note: "The exercise you hate is probably the one you need most. The conversation you're avoiding is the one you need to have." },
      { title: "First Principles Thinking", tag: "Musk", insight: "Boil things down to their most fundamental truths and reason up from there. Don't reason by analogy.", note: "Why do you train this way? If the answer references convention ('because that's what people do'), you haven't reached first principles." },
      { title: "Signal vs. Noise", tag: "Jobs", insight: "Focus is not about saying yes — it's about saying no to 1,000 things. Protect the vital few from the trivial many.", note: "Three things done deeply beat twenty things skimmed. Your training, nutrition, and sleep are the signal. Everything else is noise." },
      { title: "Working Backwards", tag: "Bezos", insight: "Start with the desired outcome and work backwards. Write the future press release first, then build what's required.", note: "Define the 90-year-old you want to be. Work backwards to today. Today's training becomes obvious." },
      { title: "The 40% Rule", tag: "Goggins", insight: "When your mind says you're done, you're only at 40% of your capacity. The callus forms in the extra rep.", note: "The voice that says 'stop' is not your limit — it's your governor. Train past it deliberately." },
      { title: "Study the Best, Install One Move", tag: "Kobe", insight: "Find the best in your field. Study them obsessively. Extract one specific technique. Install it. Repeat.", note: "Don't study broadly — study the specific person whose output you want. One installed move beats ten observed moves." },
      { title: "Choose Not to Be Harmed", tag: "Marcus", insight: "No one can harm you without your consent. You choose the meaning you assign to events.", note: "An insult is only harmful if you accept it as true. A failure is only failure if you stop. The meaning is yours to assign." },
      { title: "The Space Between", tag: "Frankl", insight: "Between stimulus and response, there is a space. In that space is your freedom to choose. In that choice is your growth.", note: "The urge to skip a workout is a stimulus. The space between that urge and your action is where character is built." },
      { title: "Steal One Good Idea", tag: "Walton", insight: "Study competitors. Find one thing they do better. Implement it. Simple, effective, ego-free improvement.", note: "Someone is doing something better than you. Find it. Install it. The ego hit is worth the improvement." },
      { title: "Occam's Razor", tag: "Logic", insight: "The simplest explanation that fits the facts is usually correct. Complexity is often noise.", note: "If your training isn't working, check sleep, nutrition, and consistency before adding complexity." },
      { title: "The Golden Rule", tag: "Ethics", insight: "Treat others as you would want to be treated. Universal across traditions. Simple, not easy.", note: "The person you're dealing with is fighting a battle you know nothing about. Default to kindness." },
      { title: "Skin in the Game", tag: "Taleb", insight: "Never trust advice from someone who doesn't bear the consequences of being wrong. Align incentives.", note: "Take advice from people who have done what you want to do. Everyone else's opinion is entertainment." },
      { title: "Antifragile", tag: "Taleb", insight: "Some things gain from disorder. Muscles, immune systems, character — all grow through stress and recovery.", note: "Your training is antifragile: stress + recovery = adaptation. The stress is not the enemy — insufficient recovery is." }
    ]
  },
  people: {
    title: "25 People Worth Studying",
    subtitle: "Full deep dives — who they were, core beliefs, how they worked, key techniques, failures, takeaways, resources, and a one-line rule to live by",
    items: [
      { title: "Steve Jobs — Signal vs. Noise", tag: "Entrepreneur", insight: "Co-founded Apple, NeXT, Pixar. Revolutionized computing, phones, animation, and music. Fierce focus on simplicity and design.", note: "Rule: Say no to 1,000 things to say yes to the one that matters.", who: "Co-founder of Apple (1976), forced out (1985), founded NeXT and bought Pixar, returned to Apple (1997) and launched iMac, iPod, iPhone, iPad. Died 2011 at 56 from pancreatic cancer.", beliefs: [{label:"Simplicity is the ultimate sophistication",desc:"Real simplicity comes from deep understanding, not superficial minimalism. Removing complexity requires more work than adding it."},{label:"The people who are crazy enough to think they can change the world are the ones who do",desc:"Non-conformity is not a bug — it's the feature that drives breakthroughs."},{label:"Stay hungry, stay foolish",desc:"Complacency is death. Always be the beginner willing to look stupid."}], workStyle: "Notoriously intense. Reality distortion field — he would will things into existence by refusing to accept they were impossible. Daily uniform (black turtleneck, jeans) to eliminate decision fatigue. Long walks for important conversations. Believed great work comes from small teams of A-players.", techniques: [{name:"Signal vs. Noise",desc:"Focus means saying no to 1,000 good ideas. Identify the one thing that matters and protect it ruthlessly."},{name:"Reality Distortion Field",desc:"Refuse to accept artificial constraints. Many 'impossible' things are merely 'nobody has tried hard enough.'"}], failures: "Fired from Apple at 30 — the company he founded. Called it 'devastastating' but later said it was the best thing that happened to him: 'The heaviness of being successful was replaced by the lightness of being a beginner again.'", takeaways: ["Focus is about saying no","Simplicity requires deep understanding","A-players want to work with A-players"], resources: [{title:"Steve Jobs",author:"Walter Isaacson",year:2011,summary:"Definitive biography based on 40+ interviews with Jobs. Covers his entire life, product philosophy, and leadership style. The single best resource on how Jobs thought and operated."}], rule: "Say no to 1,000 things." },
      { title: "Elon Musk — First Principles", tag: "Entrepreneur", insight: "SpaceX, Tesla, Neuralink, xAI. Attacks problems from physics fundamentals rather than by analogy. The richest self-made person in history who works 80-100 hour weeks.", who: "South African-born (1971). Taught himself programming at 10, sold first game Blastar at 12. Immigrated to Canada at 17, then US. Co-founded Zip2 (sold $307M), X.com → PayPal (sold $1.5B). Founded SpaceX (2002), joined Tesla as chairman then CEO, founded Neuralink, The Boring Company, xAI. Acquired Twitter/X (2022). Has 12 children. Lives by the mission to make humanity multi-planetary.", beliefs: [{label:"First principles reasoning",desc:"Boil things down to the most fundamental truths and reason up from there. 'You can't do everything by analogy — you have to reason from the ground up.'"},{label:"The future should look like the future",desc:"Complacency with the status quo is the enemy of progress. If something isn't getting better, it's dying."},{label:"Work super hard",desc:"'Work like hell. If you're trying to build a startup, 80-100 hour weeks improve your odds of success.' There are no shortcuts."},{label:"Pursue the mission, not the money",desc:"Every company he's started was mission-first. The money followed because the mission created value."},{label:"Embrace negative feedback",desc:"Actively seek out criticism. 'When friends ask if they should buy a Tesla, I tell them no — I want to hear why they wouldn't.'"}], workStyle: "Time blocks his entire calendar in 5-minute increments. Sleeps ~6 hours (2am-8am). Skips breakfast, intermittent fasting. Monday-Wednesday at SpaceX, Thursday-Friday at Tesla, weekends on Twitter/xAI. Reads voraciously as a child (2 books/day). Decision-making: physics-first, not business-school-first. Shoots for Mars, lands on the Moon — sets absurdly ambitious deadlines that are always missed but produce results faster than anyone thought possible.", techniques: [{name:"First Principles Reasoning",desc:"Break any problem down to its atomic, indisputable truths. Question every assumption. Example: 'People said rocket parts cost X. I looked at the raw materials — aluminum, titanium, copper. That's 2% of the price. So we build rockets ourselves.'"},{name:"The Algorithm (5 Steps)",desc:"1. Question every requirement. 2. Delete any part or process you can. 3. Simplify and optimize. 4. Accelerate cycle time. 5. Automate. In that order — never automate before you've deleted."},{name:"Idiot Index",desc:"Ratio of total cost of a component to the cost of its raw materials. If the index is high (>10), design and build it yourself. Applied to rocket parts, battery packs, and tunnel boring."}], failures: "SpaceX's first three rocket launches (2006-2008) all failed. Company was ~48 hours from bankruptcy. Fourth launch succeeded. Tesla nearly went bankrupt in 2008 and again during Model 3 'production hell' (2018) — he slept on the factory floor. Was ousted as PayPal CEO while on his honeymoon. Publicly, the Cybertruck window smash demo fail (2019) and controversial Twitter statements that cost billions.", takeaways: ["Question every requirement — most are dumb defaults, not laws of physics","Delete before you optimize — don't improve something that shouldn't exist","The 'idiot index' is a universal tool: if you're paying 10x material cost for anything, you're being fleeced","Ambition attracts talent — nobody wants to work on something that's merely 'a little better'"], resources: [{title:"Elon Musk",author:"Walter Isaacson",year:2023,summary:"The definitive biography based on two years shadowing Musk. Covers his childhood trauma, his demons, his drive, and the inner workings of SpaceX, Tesla, and Twitter. Essential for understanding how he operates."},{title:"Elon Musk: Tesla, SpaceX, and the Quest for a Fantastic Future",author:"Ashlee Vance",year:2015,summary:"The first major biography. Excellent coverage of Musk's South African childhood, his early startups, and the near-death experiences of SpaceX and Tesla. More accessible than Isaacson's doorstop."},{title:"The Musk Algorithm (various interviews)",author:"Elon Musk via Tim Dodd (Everyday Astronaut) and Lex Fridman",year:"2019-2023",summary:"Musk has laid out his 5-step engineering algorithm in multiple interviews. Watch the Everyday Astronaut Starbase tour for the most detailed walkthrough of first principles thinking applied to rocketry."}], rule: "Boil things down to what's certainly true, then reason up from there." },
      { title: "Sam Walton — Steal One Good Idea", tag: "Entrepreneur", insight: "Built Walmart from a single five-and-dime in Bentonville, Arkansas into the world's largest retailer ($600B+ revenue). Obsessed with learning from competitors and talking to front-line employees.", who: "Born 1918 in Kingfisher, Oklahoma. Eagle Scout, quarterback, served in WWII. Bought a Ben Franklin franchise in Newport, Arkansas (1945), lost the lease, started over in Bentonville. Opened first Walmart (1962) at age 44. Drove a 1979 Ford pickup with dog cages. Flew commercial his entire life. At one point the richest man in America — his reaction: 'I don't think about it much.' Died 1992. Within 3 years, his widow and children had given away billions.", beliefs: [{label:"The customer is the boss",desc:"Every decision should be made by asking 'Does this serve the customer?' Not shareholders, not ego — the person walking into the store."},{label:"Learn from everyone — especially competitors",desc:"Walton visited competitors constantly with a yellow legal pad and tape recorder. 'I probably learned more from Kmart and Sears than from anyone.'"},{label:"Celebrate success, admit failure",desc:"The famous Walmart Saturday Morning Meeting was part pep rally, part confession booth. Failures were admitted publicly, learned from, and moved past."},{label:"Swim upstream",desc:"Chose small towns (5,000-25,000 people) that big retailers ignored. When everyone else went to cities, Walton went rural. Counter-positioning is the strongest competitive strategy."},{label:"Information is power",desc:"Invested heavily in technology (satellite network, early barcode scanners, real-time inventory) when competitors thought it was wasteful."}], workStyle: "Woke at 4:30am daily. Visited 5-6 stores per week (every week for 30+ years) by driving himself in his pickup truck. Saturday Morning Meeting at 7am — mandatory, high-energy, included cheers and the famous 'Walmart Cheer.' Always carried a yellow legal pad and tape recorder. Flew coach. Shared hotel rooms. Ate at family diners. Talked to literally everyone — cashiers, stock boys, truck drivers, competitors' employees.", techniques: [{name:"Steal One Good Idea",desc:"Every competitor has at least one thing they do better than you. Find it. Install it. Walton built Walmart by synthesizing hundreds of small ideas stolen from competitors, not by inventing one big one."},{name:"Management by Walking Around",desc:"Spent 90% of his time in stores, not in the office. Talked to front-line employees. The best information is at the bottom of the organization, not the top."},{name:"Beat Yesterday",desc:"Internal competition between stores, departments, and associates — not against external benchmarks, but against their own past performance. 'If you beat yesterday, the competition takes care of itself.'"}], failures: "His first store (Ben Franklin franchise, Newport, AR) was highly successful — top in the region. But he'd failed to include a renewal clause in the lease. The landlord refused to renew, took the store, and gave it to his son. Walton was 32, devastated, and nearly quit retail. Instead, he drove around Arkansas looking for a new town, bought a smaller store in Bentonville, and built Walmart. He called losing that first store 'the best thing that ever happened to me — if I'd stayed in Newport, I would've been too comfortable to build what came next.'", takeaways: ["Visit your competitors — not to copy, but to find ONE thing they do better and install it","The best information in any organization is at the front line — talk to the people doing the work","A lost lease was the best thing that happened to Walton. Your biggest setback is likely a setup for something better","Technology investment should be early and aggressive — Walmart had a private satellite network in the 1980s"], resources: [{title:"Sam Walton: Made in America",author:"Sam Walton with John Huey",year:1992,summary:"Autobiography written in the final year of his life. The single best business autobiography ever published. Covers every principle, failure, and triumph in Walton's own voice. Short, readable, essential."},{title:"The Everything Store (Walmart chapters)",author:"Brad Stone",year:2013,summary:"While primarily about Amazon/Bezos, the Walmart comparison chapters show how Walton's principles were directly studied and applied by Bezos. Useful for seeing Walton's influence."}], rule: "Visit competitors, find one thing they do better, install it today." },
      { title: "Jeff Bezos — Working Backwards", tag: "Entrepreneur", insight: "Built Amazon from a garage bookstore (1994) into a $2 trillion company spanning e-commerce, cloud computing (AWS), AI, space (Blue Origin), and media. Relentlessly customer-obsessed.", who: "Born 1964 in Albuquerque. Valedictorian, Princeton (EE/CS). Worked at hedge fund D.E. Shaw, left at 30 to sell books on the internet. Drove cross-country to Seattle writing the business plan en route. Launched Amazon from his garage (1994). Survived the dot-com crash while competitors died. Launched AWS (2006) — now the world's dominant cloud platform. Owns The Washington Post. Founded Blue Origin (2000). Stepped down as Amazon CEO 2021. Net worth ~$200B+. Known for his laugh and his 'question mark' emails.", beliefs: [{label:"Customer obsession, not competitor obsession",desc:"Start with what the customer needs and work backwards. Competitors are a distraction. 'If we focus on competitors, we're following. If we focus on customers, we're leading.'"},{label:"It's always Day 1",desc:"Complacency is death. Day 2 is stasis, followed by irrelevance, followed by death. The Day 1 mentality means treating every day like the first day of a startup."},{label:"Disagree and commit",desc:"If you disagree with a decision but the team has decided, commit to it fully. No passive resistance, no 'I told you so.' Genuine, wholehearted commitment."},{label:"High-velocity decision making",desc:"Most decisions are two-way doors (reversible). Make them fast with ~70% of the information. One-way door decisions (irreversible) deserve deep analysis."},{label:"Long-term thinking",desc:"Be willing to be misunderstood for long periods. 7+ year timelines for major bets (AWS, Alexa, Prime). 'If everything you do needs to work in 3 years, you're competing against a lot of people.'"}], workStyle: "Makes his first decision of the day with a coffee. No early morning meetings — does his highest-cognitive-load work before 10am. Schedules important meetings before lunch. Afternoons for lower-stakes work. Famous for '6-page narrative memos' (never PowerPoint) — meetings start with 30 minutes of silent reading. Known for 'wandering' — open, unstructured exploration of ideas. Two-pizza team rule (teams small enough to feed with two pizzas). 'Type 1 / Type 2' decision framework.", techniques: [{name:"Working Backwards",desc:"Start by writing the imaginary press release for a finished product. What's the headline? What's the customer benefit? What are the FAQs? Then build the product to match the press release, not the other way around."},{name:"Six-Page Narratives",desc:"No PowerPoint. No bullet points. Full sentences, paragraphs, and narrative structure force clearer thinking than slides ever can. The act of writing a 6-page memo is the act of thinking."},{name:"Regret Minimization Framework",desc:"Project yourself to age 80. Will you regret NOT trying this thing? If yes, do it. This is how Bezos decided to leave a high-paying Wall Street job to sell books on the internet in 1994."}], failures: "Amazon's fire phone (2014) was a $170 million disaster. Amazon Auctions failed against eBay. Amazon Destinations (travel) shut down. Dozens of failed products. Bezos' response to the Fire Phone: 'If you're going to take big swings, you're going to strike out. If you're not striking out, you're not taking big enough swings.' AWS was initially mocked as 'Amazon's little side project.'", takeaways: ["Start with the press release — define success before building","Most decisions are reversible — make them faster. Indecision costs more than wrong decisions","Write narratives, not bullet points. Clear writing requires clear thinking","Be willing to be misunderstood for 7+ years. That's where the biggest opportunities live"], resources: [{title:"Invent and Wander: The Collected Jeff Bezos Writings",author:"Jeff Bezos (collected by Walter Isaacson)",year:2020,summary:"Collection of Bezos's annual shareholder letters (1997-2020) plus speeches and interviews. The shareholder letters alone are a masterclass in long-term thinking. Read them chronologically to see the principles applied over decades."},{title:"The Everything Store: Jeff Bezos and the Age of Amazon",author:"Brad Stone",year:2013,summary:"The definitive Amazon history. Covers Bezos's childhood, the garage startup era, the dot-com near-death, AWS's secret origins, and the culture that made Amazon relentless. Updated edition covers through 2020."},{title:"Amazon Shareholder Letters (1997-2020)",author:"Jeff Bezos",year:"1997-2020",summary:"Free online. The single best business education available at no cost. Each year reinforces the same principles applied to new domains. 'It's always Day 1' appears in every letter."}], rule: "Write the future press release first — then build what's required to make it true." },
      { title: "Andrew Carnegie — Master Delegation", tag: "Industrialist", insight: "Scottish immigrant (arrived penniless at 12) who built Carnegie Steel, the largest industrial enterprise of the 19th century. Sold to J.P. Morgan for $480M (equivalent to ~$15B today). Then gave away 90% of his fortune.", who: "Born 1835 in Dunfermline, Scotland. Family immigrated to Pittsburgh (1848) — 13 years old, working 12-hour days as a bobbin boy for $1.20/week. Self-educated through a generous man who opened his private library to working boys. Rose from telegraph messenger to railroad superintendent by 24. Invested in sleeping cars, oil, bridges. Built Carnegie Steel (1870s-1890s) via vertical integration — owned the mines, railroads, ships, and mills. Sold to Morgan (1901) creating U.S. Steel. Spent his final 18 years giving away $350M+ (~$10B today): 2,811 public libraries, Carnegie Hall, Carnegie Mellon University, peace foundations. Died 1919.", beliefs: [{label:"The man who dies rich dies disgraced",desc:"Published in The Gospel of Wealth (1889). The rich have a moral obligation to distribute their wealth during their lifetime for the public good — not to leave it to heirs or be buried with it."},{label:"Surround yourself with people smarter than you",desc:"Carnegie's alleged epitaph: 'Here lies a man who knew how to enlist in his service better men than himself.' He didn't know steel — he knew who knew steel."},{label:"Take away my people but leave my factories — grass will grow. Take away my factories but leave my people — we'll build new factories",desc:"People are the irreplaceable asset. Everything else is replaceable."},{label:"Put all your eggs in one basket, and then watch that basket",desc:"Focus and vigilance. Diversification is protection against ignorance; concentration is the engine of wealth creation."}], workStyle: "Rose at 6am. Handled all important correspondence personally (no secretary for key letters). Took notes on everything. Practiced 'mental chemistry' — deliberately exposing himself to brilliant people to absorb their thinking. Fiercely competitive but maintained friendships with rivals. Evening reading and writing. Wrote extensively (8 books, hundreds of articles). Made decisions quickly on business, deliberatively on philanthropy (required communities to contribute matching funds for library grants — 'ladders upon which the aspiring can rise').", techniques: [{name:"The Master Mind Principle",desc:"Deliberately assemble a group of brilliant people and meet regularly. The combined intelligence of the group exceeds the sum of individuals. Carnegie's inner circle was legendary — Charles Schwab, Henry Clay Frick, Henry Phipps."},{name:"Vertical Integration",desc:"Own every link in the chain from raw material to finished product. Mines → railroads → ships → mills → distribution. Eliminate middlemen. Control quality and cost at every step."},{name:"Stress as a Promotion Signal",desc:"Carnegie deliberately gave young employees more responsibility than they thought they could handle. If a 25-year-old didn't look stressed, he wasn't being challenged enough. 'The man who doesn't look worried isn't paying attention.'"}], failures: "The Homestead Strike (1892) was the bloodiest labor conflict in American history. Carnegie was in Scotland while his partner Henry Clay Frick brought in Pinkerton agents — 16 dead. Carnegie's reputation never fully recovered. He later wrote: 'No event in my life caused me more pain.' His response was to double down on philanthropy, especially for workers' education and libraries. Also: he was famously wrong about the future of steel several times, nearly bankrupt multiple times in early railroad investments.", takeaways: ["Your job as a leader is to find, hire, and empower people smarter than you","Deliberately give young people more responsibility than they think they can handle","The Gospel of Wealth: you can't take it with you. Give it away while you're alive, with strategy","Vertical integration — own the bottleneck. Whatever you depend on, find a way to own or eliminate that dependency"], resources: [{title:"The Autobiography of Andrew Carnegie",author:"Andrew Carnegie",year:1920,summary:"Published posthumously. Covers his rise from poverty to richest man in the world, his business philosophy, and his views on wealth and philanthropy. Short, readable, and surprisingly modern in its outlook."},{title:"The Gospel of Wealth",author:"Andrew Carnegie",year:1889,summary:"Extended essay published in the North American Review. The foundational text of modern philanthropy. Argues that the rich are trustees, not owners, of their wealth. Short enough to read in an hour."},{title:"Carnegie",author:"Peter Krass",year:2002,summary:"The most comprehensive and balanced modern biography. Doesn't shy away from Homestead, but also shows the full scope of Carnegie's contradictions — ruthless capitalist and generous philanthropist, often in the same afternoon."}], rule: "Surround yourself with people smarter than you, then empower them completely." },
      { title: "Alex Hormozi — Volume + Skill", tag: "Entrepreneur", insight: "Went from sleeping on gym floors to $100M+ net worth by 30. Built GymLaunch and ALAN. Modern master of customer acquisition, offer design, and the philosophy that volume negates luck.", who: "Born 1988. Iranian-American. Was an overweight kid who transformed himself through fitness. Management consultant (Bain & Co.) → quit to start a gym → sleeping on the gym floor because he couldn't afford rent. Built GymLaunch (gym turnaround) to 30+ locations, sold it. Built ALAN (licensing platform for supplement companies) to $200M+ in revenue. Now runs Acquisition.com, investing in and scaling boring businesses. Posts daily, writes dense books, gives away everything he knows. Known for extreme work ethic: 12-16 hour days, 7 days/week for years.", beliefs: [{label:"Volume negates luck",desc:"Most people fail because they don't do enough reps. Not because they're unlucky, untalented, or have a bad strategy. 100 cold calls > 10 cold calls, regardless of script quality."},{label:"The market pays for value, not effort",desc:"Your hard work is irrelevant if it doesn't produce value for someone else. The only metric that matters: are you making someone's life better enough that they'll pay for it?"},{label:"Constraints breed creativity",desc:"Having no money forces better thinking than having lots of money. When you can't buy your way out, you have to think your way out."},{label:"Input goals, not output goals",desc:"You control inputs (calls made, content published, sets completed). You don't control outputs (revenue, followers, muscle gained). Obsess over inputs — outputs take care of themselves."}], workStyle: "Work blocks: 4-hour deep work sessions, 2-3 per day. First 4 hours: most important business task. Second 4: content creation. Third 4: meetings/admin. Trains 5-6 days/week (hypertrophy focus). Sleeps 7-8 hours. No alcohol. Ketogenic-leaning diet. Reads 1-2 books/week. Writes daily. Reviews numbers weekly. 'Sprints' — 90-day all-out focus blocks on one outcome, then reassess. Uses Notion for everything. Morning routine: workout, then straight into deepest work.", techniques: [{name:"$100M Offers (Grand Slam Offer)",desc:"Make an offer so good that people feel stupid saying no. Elements: provide massive value, reverse all risk (guarantee), attach a high price to signal quality, limit availability. 'Your offer is everything.'"},{name:"The Acquisition Trinity",desc:"Get customers through 3 channels: paid ads (fast, expensive), content (slow, builds moat), outbound (direct, high rejection). Master at least one; ideally, use all three."},{name:"Brass Balls Framework",desc:"Pick a big, scary, specific goal. Set a deadline. Tell everyone. Burn the boats. The social cost of failure becomes fuel. Used this for his first $1M year — told everyone he'd hit it, then worked 100-hour weeks to avoid the embarrassment of failure."}], failures: "His first gym failed. He was sleeping on the floor of it because he couldn't afford rent. Lost $50,000+ in bad business deals early on. Multiple product launches that made zero sales. Nearly bankrupt twice. His response to every failure: 'The lesson IS the asset. I just paid tuition. Now I have knowledge that nobody else has, and I'll never make that specific mistake again.'", takeaways: ["Volume is the great equalizer — do more reps than anyone thinks is reasonable","Make offers so good people feel stupid saying no — this is a skill you can learn, not a gift","Set scary public goals. The social accountability will fuel you when motivation runs out","'Tuition' reframing: every failure is tuition paid for education. Extract the lesson and the tuition was worth it"], resources: [{title:"$100M Offers: How to Make Offers So Good People Feel Stupid Saying No",author:"Alex Hormozi",year:2021,summary:"Hormozi's first book. Dense, practical framework for creating irresistible offers. Covers value stacking, pricing psychology, risk reversal, and the grand slam offer formula. The most actionable business book of the 2020s."},{title:"$100M Leads: How to Get Strangers to Want to Buy Your Stuff",author:"Alex Hormozi",year:2023,summary:"Sequel to $100M Offers. Covers the entire customer acquisition process — lead magnets, engagement, conversion. Practical, no-fluff, reads like a manual."},{title:"Alex Hormozi YouTube Channel",author:"Alex Hormozi",year:"2020-ongoing",summary:"Daily videos covering offer design, acquisition, hiring, operations, and mindset. Hormozi's content is unusually generous — he gives away the entire playbook. Check the 'Mozination' playlist for the greatest hits."}], rule: "Volume negates luck. Do more reps than anyone else, and the 'luck' takes care of itself." },
      { title: "David Ogilvy — The Big Idea", tag: "Advertising", insight: "Father of modern advertising. Built Ogilvy & Mather from a tiny agency into a global giant. His principles of research, clarity, and respecting the consumer's intelligence transformed advertising from carnival barking into a discipline.", who: "Born 1911 in England. Failed at Oxford. Worked as a chef in Paris, a door-to-door stove salesman (very successfully — wrote an instruction manual for other salesmen that Fortune called 'the best sales manual ever written'), a farmer in Pennsylvania, and a British intelligence officer during WWII. Started Ogilvy & Mather in 1948 at age 37 with $6,000 and no advertising experience. Within 10 years, it was one of the world's largest agencies. Produced some of the most famous ads in history: the Hathaway shirt man with the eye patch, the Rolls-Royce headline ('At 60 miles an hour the loudest noise comes from the electric clock'), and the Dove campaign. Died 1999.", beliefs: [{label:"The consumer is not a moron — she's your wife",desc:"Don't lie to her. Don't insult her intelligence. If you think a cheap trick will make her buy a product, you're the moron, not her."},{label:"Big ideas come from the unconscious",desc:"You can't schedule a big idea. You can only prepare obsessively (research, research, research), then go for a long walk and let your unconscious do the work."},{label:"If it doesn't sell, it isn't creative",desc:"Creativity without commercial effect is just art. In advertising, the only creativity that counts is creativity that sells."},{label:"Hire people bigger than yourself",desc:"'If each of us hires people who are smaller than we are, we shall become a company of dwarfs. If each of us hires people who are bigger than we are, we shall become a company of giants.'"}], workStyle: "Arrived at the office at 10am. Read everything about the client before writing a word. Research was obsessive — he'd spend weeks studying the product, the market, and the consumer before touching the creative brief. Wrote and rewrote endlessly ('I am a lousy copywriter, but I am a good editor'). Demanded excellence, fired people who produced mediocrity, and mentored those who showed promise. Annual ritual: sent a Russian doll (matryoshka) to every employee — if they opened all the dolls, the smallest one contained a note: 'If each of us hires people smaller than ourselves, we shall become a company of dwarfs.'", techniques: [{name:"Research Before Creative",desc:"Spend 80% of your time on research, 20% on creation. Know the product, the consumer, and the competition intimately before you write a single word. 'Advertising people who ignore research are as dangerous as generals who ignore decodes of enemy signals.'"},{name:"The Big Idea",desc:"Every campaign needs ONE big idea. Not three. Not five. One. A big idea is recognizable: it makes you gasp, it's simple, it can be used for 30 years. The Hathaway eye patch was a big idea. 'At 60mph the loudest noise is this electric clock' was a big idea."},{name:"Headline Supremacy",desc:"5x as many people read the headline as read the body copy. If the headline doesn't sell, you've wasted 90% of your money. Write 16+ headlines for every ad. Test them. The best headline wins."}], failures: "Failed out of Oxford (he later called it 'the best thing that ever happened to me'). Many campaigns that flopped (he freely admitted that most of his ads didn't beat the control). Lost major clients (Shell, after 30 years). His response to failures was systematic analysis: 'What exactly didn't work? What was the consumer's actual response? What will I do differently next time?' No ego attachment to specific ads — only to results.", takeaways: ["Research before you create. 80% research, 20% creation — in that order","Write 16+ headlines. Your first idea is rarely your best. Quantity leads to quality","One big idea per campaign. If you have three 'big' ideas, you have zero big ideas","Hire people bigger than yourself. The Russian doll principle applies to every domain"], resources: [{title:"Ogilvy on Advertising",author:"David Ogilvy",year:1983,summary:"The definitive book on advertising by its greatest practitioner. Profusely illustrated with case studies of his greatest campaigns. Covers copywriting, layout, TV, direct mail, and how to run an agency. Ambitious in its scope, but written with Ogilvy's characteristic wit and clarity."},{title:"Confessions of an Advertising Man",author:"David Ogilvy",year:1963,summary:"Ogilvy's first and most famous book. Part memoir, part manual. Covers his philosophy of advertising, management, and life. The chapter 'How to Rise to the Top of the Tree' is worth the price alone."},{title:"The Unpublished David Ogilvy",author:"David Ogilvy (edited by Joel Raphaelson)",year:1986,summary:"Collection of Ogilvy's internal memos, letters, and notes. Shows his management philosophy in action — the memos are masterpieces of direct, clear, occasionally brutal communication. Essential reading for anyone who manages people."}], rule: "The consumer is not a moron — she's your wife. Respect her intelligence or she'll ignore you." },
      { title: "Gary Halbert — Market First", tag: "Copywriting", insight: "Legendary direct-response copywriter. His 'Coat of Arms' letter mailed 600 million+ copies. Obsessed with the truth that a great list crushes great copy.", who: "Born 1938. Grew up in Florida. Started writing direct mail copy in the 1960s. Became the most influential American copywriter of the 20th century through his newsletters (The Gary Halbert Letter) and seminars. Known for the 'Gary Halbert Challenge' — 'If you and I both had a burger stand, and you could have any advantage (better buns, better meat, better prices), I'd only need ONE advantage to beat you: a starving crowd.' His sons Bond and Kevin also became top copywriters. Served time in federal prison (tax evasion) and wrote some of his best newsletters from his cell. Died 2007.", beliefs: [{label:"The market matters more than the message",desc:"A mediocre sales letter to a hungry market will always outsell a brilliant letter to a dead market. Find starving crowds."},{label:"Copy cannot be written from an ivory tower",desc:"You must know the product intimately, use the product, talk to customers, read their exact words. The best copy comes from immersion, not imagination."},{label:"Your number one job is to get the envelope opened",desc:"If nobody opens the envelope (or clicks the email, or reads the headline), the best body copy in the world is worthless. The subject line/headline/envelope teaser is 80% of the battle."},{label:"Repetition is persuasion",desc:"Tell them what you're going to tell them. Tell them. Tell them what you told them. People need to hear things multiple times before they act."}], workStyle: "Wrote by hand on yellow legal pads. Rewrote constantly. Tested everything. Collected successful ads obsessively (had a massive swipe file). Wrote daily newsletter to his sons/students from prison and from home. Believed in 'eating your own dog food' — only writing ads for products he actually used. Spent more time thinking about the target market than the actual copy. Morning ritual: read the Wall Street Journal, then write for 4 hours.", techniques: [{name:"The Starving Crowd",desc:"Your first and most important marketing decision is WHICH market you serve. Find a market with a burning, urgent problem they're already spending money trying to solve. The best copy in the world can't sell to people who don't care."},{name:"Coat of Arms Letter",desc:"The most mailed sales letter in history (>600M copies). Proven structure: personal story hook → historical/emotional connection → scarcity of the product → social proof → clear CTA. Study this letter — it's a masterclass in emotional direct response."},{name:"A/B Testing Obsessively",desc:"Test headlines. Test prices. Test offers. Test lists. The market tells you what works — your opinion is irrelevant. Halbert tested everything and let the data make decisions."}], failures: "Convicted of tax evasion (1980s), served time in federal prison. Lost his house, his agency, and years of freedom. His response: kept writing. Wrote some of his most famous newsletters from prison, maintained his relationship with his sons via long letters and copy critiques, and rebuilt his career after release. 'I learned more about persuasion in prison than I ever did in a boardroom.'", takeaways: ["Find a starving crowd — market selection is more important than any other variable","Your swipe file is your most valuable asset — collect great ads and study them","Write. Test. Learn. Repeat. The market tells you what works","One great sales letter, mailed to the right list, can change your life"], resources: [{title:"The Boron Letters",author:"Gary Halbert",year:"1980s",summary:"A series of 25 letters Halbert wrote to his son Bond from federal prison. Covers copywriting, direct mail, health, and life philosophy. The most beloved work in the copywriting canon — reads like a wise, slightly rogue uncle dispensing truth."},{title:"The Gary Halbert Letter (archives)",author:"Gary Halbert",year:"1986-2007",summary:"Halbert's monthly newsletter. Hundreds of issues covering every aspect of direct response marketing. Available free online. Search for the issue on 'The Coat of Arms Letter' and 'The World's Greatest Direct Mail Letter.'"},{title:"Scientific Advertising",author:"Claude Hopkins (recommended by Halbert)",year:1923,summary:"The book Halbert told every student to read. Written in 1923 but timeless. Hopkins pioneered split-testing and coupon tracking a century ago. Halbert said: 'If you read only one book on advertising, make it this one.'"}], rule: "A great offer to the right starving crowd beats brilliant copy every single time." },
      { title: "Russell Brunson — Funnel Architecture", tag: "Marketing", insight: "Founded ClickFunnels ($100M+/year SaaS). Modernized direct-response marketing by productizing the sales funnel into software. Built a movement around funnels, value ladders, and community-based marketing.", who: "Born 1980 in Utah. Wrestler in college. Started his first online business selling potato gun plans (yes, really) while in school. Built a supplement company, sold it. Built ClickFunnels (2014) which grew to $100M+ in annual revenue with no venture capital. Author of the 'Secrets' trilogy (DotCom Secrets, Expert Secrets, Traffic Secrets). Hosts the annual Funnel Hacking Live event with 5,000+ attendees. Teaches that the funnel is not just software — it's a strategic approach to understanding the customer's journey from stranger to raving fan.", beliefs: [{label:"The funnel is the business",desc:"Your website is not your business. Your funnel is. A funnel is a deliberate, designed customer journey from first contact to lifetime customer."},{label:"The fortune is in the follow-up",desc:"Most sales happen after the 7th contact — not the first. Email sequences, retargeting, and community nurture are where the real money is made."},{label:"Sell the click, then the product",desc:"People don't buy products. They buy results, status, belonging, and relief. Sell the transformation, not the mechanism."},{label:"You are three core funnels away from a $1M business",desc:"A lead funnel, an offer funnel, and an ascension funnel. That's it. Most people overcomplicate."}], workStyle: "Extreme early riser (4:30am). Morning scripture study and journaling. Then deep work on highest-leverage task of the day. Afternoons: internal meetings, content creation, creative work. Evening: family time. Reads constantly — credits his wrestling coach with teaching him the grind. Known for intense 90-day sprints on specific goals (launch, event, product). The 'Dream 100' exercise is his signature strategic tool.", techniques: [{name:"The Value Ladder",desc:"Customers don't go from $0 to $10,000. They climb a value ladder: free lead magnet → low-ticket offer ($7-47) → core offer ($97-997) → high-ticket ($1,997+) → continuity ($97+/month). Each rung funds the acquisition of the next."},{name:"The Dream 100",desc:"Identify the 100 people/influencers who already have the audience you want. Build relationships with them. Partner with them. Don't compete — collaborate. Every successful launch Brunson does started with a Dream 100 list."},{name:"Attractive Character",desc:"The face of your brand must be someone your audience wants to follow — not just for information, but for personality, story, and values. Brunson is the Attractive Character for ClickFunnels. Your brand needs one too."}], failures: "First company (potato gun plans) made almost nothing. His supplement company was a constant struggle. Early versions of ClickFunnels were buggy and nearly lost everything. Lost millions on a failed MLM venture. Biggest professional failure: a high-profile launch that generated $3M+ but the product wasn't ready — mass refunds, repudiation damage, and a humbling lesson in 'launch when the product is ready, not when the calendar says so.'", takeaways: ["Three core funnels = a $1M+ business: lead funnel, offer funnel, ascension funnel","The Dream 100 is your highest-leverage marketing activity — 100 people control your destiny","Customers climb a value ladder. Meet them at their current rung, not yours","A buggy product launched too soon costs more than a late product launched right"], resources: [{title:"DotCom Secrets",author:"Russell Brunson",year:2015,summary:"The funnel playbook. Covers the value ladder, the Attractive Character, and the core funnel types. Free (you pay shipping). Dense with frameworks. This is the book that launched the modern funnel movement."},{title:"Expert Secrets",author:"Russell Brunson",year:2017,summary:"How to position yourself as the expert in your market. Covers the Attractive Character in depth, building a movement (not just a customer base), and the 'perfect webinar' script. The second book in the Secrets trilogy."},{title:"Traffic Secrets",author:"Russell Brunson",year:2020,summary:"How to get customers — the Dream 100 method detailed, plus paid traffic strategies. The third book in the trilogy. Complete the set: DotCom Secrets (what to say) → Expert Secrets (who to be) → Traffic Secrets (how to get people to see it)."}], rule: "Build the vehicle once, drive traffic through it forever. The funnel is the business." },
      { title: "Robert Cialdini — The 7 Principles", tag: "Psychology", insight: "Godfather of persuasion science. Author of Influence (5M+ copies sold). Spent 3 years going 'undercover' in sales, fundraising, and advertising to understand how persuasion actually works.", who: "Born 1945. PhD in social psychology from UNC Chapel Hill. Professor emeritus at Arizona State University. Rather than just run lab experiments, Cialdini embedded himself in the real world — trained at car dealerships, telemarketing firms, and fundraising organizations. Published Influence: The Psychology of Persuasion (1984), which became the most cited book on persuasion. Later added a 7th principle (Unity). New York Times bestselling author. His work is referenced by everyone from Warren Buffett to Barack Obama.", beliefs: [{label:"Persuasion is not manipulation when used ethically",desc:"The principles work because they're shortcuts our brains developed for good reasons. Using them ethically means guiding people to decisions that genuinely serve them."},{label:"The most powerful influence is often the least visible",desc:"The most effective persuasion doesn't feel like persuasion. It feels like a natural decision the person made themselves."},{label:"Scarcity is the most emotionally powerful principle",desc:"People are more motivated by the thought of losing something than by the thought of gaining the same thing. 'Limited time' works because loss aversion is hardwired."},{label:"Pre-suasion: what happens BEFORE the message matters most",desc:"The moment before you deliver your message determines whether it lands. Set the context, then deliver the message."}], workStyle: "Cialdini's research method was unique: systematic participant observation. He took jobs as a car salesman, telemarketer, waiter, and fundraiser. He didn't just ask what persuaders did — he became one. Academic by training, journalist by method. Writes slowly and carefully, testing every claim against evidence. His books typically take 5-7 years to write. Now runs Influence at Work, a consulting and training firm.", techniques: [{name:"The 7 Principles of Persuasion",desc:"1. Reciprocity (people return favors). 2. Scarcity (people want what's limited). 3. Authority (people follow credible experts). 4. Consistency (people honor commitments). 5. Liking (people say yes to those they like). 6. Social Proof (people follow the crowd). 7. Unity (people say yes to 'us')."},{name:"Pre-Suasion",desc:"The most important moment in persuasion is what happens just BEFORE you deliver your message. If you ask people 'are you helpful?' before making a request, compliance increases significantly. Set the channel before you send the signal."},{name:"Social Proof in Action",desc:"Don't tell people how many people are doing the wrong thing ('70% of people don't recycle'). Instead, highlight the positive norm ('90% of your neighbors now recycle'). Negative norms normalize bad behavior."}], failures: "Cialdini has been remarkably consistent, but he admits that applying his own principles to himself is hard — he's fallen for every one of them. Late in his career, he acknowledged that Influence underplayed the role of Unity (shared identity) and wrote Pre-Suasion as a correction. Also, many marketers have misused his principles unethically — Cialdini has spent decades fighting against the dark-side applications of his own work.", takeaways: ["Use the 7 principles as a checklist before any important conversation","Pre-suasion: what happens 30 seconds before the ask determines the answer more than the ask itself","Social proof: highlight positive norms, not negative ones","Defense against persuasion: if a decision feels pressured by scarcity, pause 24 hours"], resources: [{title:"Influence: The Psychology of Persuasion",author:"Robert Cialdini",year:"1984 (updated 2021)",summary:"The single most important book on persuasion. Covers the 6 (now 7) principles with deep research and riveting real-world examples. The 2021 edition adds Unity. If you read only one book on persuasion, make it this one."},{title:"Pre-Suasion: A Revolutionary Way to Influence and Persuade",author:"Robert Cialdini",year:2016,summary:"The sequel/follow-up. Argues that the most important moment in persuasion is BEFORE the message is delivered. Shows how to create 'privileged moments' when audiences are maximally receptive."},{title:"Yes!: 50 Secrets from the Science of Persuasion",author:"Noah Goldstein, Steve Martin, Robert Cialdini",year:2007,summary:"50 short, practical application chapters. Each is ~3 pages. Perfect for daily reading — one 'secret' per day applied immediately. More tactical than Influence."}], rule: "Ethical persuasion works through 7 principles — learn them, use them, defend against their misuse." },
      { title: "David Goggins — The 40% Rule", tag: "Endurance", insight: "Navy SEAL (Class 235, 3 Hell Weeks in one year), Army Ranger, Air Force TACP. Former world record holder for pull-ups (4,030 in 17 hours). Lost 106 lbs in 3 months to qualify for SEALs. Illiterate in math until his 20s. The living embodiment of mental toughness.", who: "Born 1975 in Buffalo, NY. Abusive childhood (father beat him and his mother; he still has a stutter from the trauma). Racially bullied in school. Obese (297 lbs) at 24 working as an exterminator. Saw a SEAL documentary on TV, decided to join. Lost 106 lbs in 90 days. Failed BUD/S twice, passed on third attempt. Broke his feet during his first 100-mile race (he'd never run a marathon). Holds the world pull-up record. Survived: sickle cell trait, atrial septal defect (hole in heart, undiagnosed until 40s), multiple stress fractures, and his own self-doubt. Runs on broken legs. Published Can't Hurt Me (2018), which became a phenomenon.", beliefs: [{label:"The 40% Rule",desc:"When your mind tells you you're done, you're only at 40% of your actual capacity. The remaining 60% is held in reserve by your brain's self-preservation instinct."},{label:"Callous your mind",desc:"Just like you build calluses on your hands through repeated friction, you build mental calluses by repeatedly doing things you don't want to do. Every hard thing is one more layer."},{label:"Take souls",desc:"When you're competing against someone and you outwork them so completely that they mentally break — you've taken their soul. They know it. You know it. There's no coming back from that."},{label:"The only way to grow is to suffer",desc:"Comfort is the enemy. Every significant growth in his life came after his most brutal suffering. Seek the hard path deliberately — on the other side of suffering is the person you're capable of becoming."}], workStyle: "Wakes at 4-4:30am. Morning: 5-10 mile run immediately (no breakfast, no phone). Then stretching/foam rolling (1+ hour — non-negotiable). Then skill work or studying. Two workouts per day is minimum. Runs in all weather (especially bad weather). Studies his weaknesses (spent 12+ hours/day studying to pass the ASVAB after being functionally illiterate in math). Accountability mirror: puts Post-it notes with his insecurities on his mirror and confronts them every morning. 'No days off' was literal for him for years — he ran 8+ miles every single day for over 2 years straight.", techniques: [{name:"The Accountability Mirror",desc:"Write your insecurities, weaknesses, and goals on Post-it notes. Stick them to your bathroom mirror. Confront them every morning. 'You can't lie to the mirror.' The mirror forces radical honesty."},{name:"The Cookie Jar",desc:"Mentally store every past victory, every hard thing you've survived, every proof that you're tougher than you think. When you want to quit, reach into the Cookie Jar and pull one out. 'I survived X, so I can survive this.'"},{name:"Callous Your Mind",desc:"Seek out hard things that you don't want to do. Do them first thing in the morning. Every day. The first hour of your day determines the entire day. If you do the hardest thing first, the rest of the day is easy."}], failures: "Failed BUD/S Hell Week TWICE (stress fractures, pneumonia). Failed ASVAB (military entrance exam) multiple times — functionally illiterate in math. Failed his first ultramarathon spectacularly (kidney failure, blood in urine). Broke his feet during his first 100-miler and ran 60+ miles on broken feet. His response to failure: restart. Every. Single. Time. 'I don't stop when I'm tired. I stop when I'm done.'", takeaways: ["When you think you're at your limit, you're at 40%. The rest is in your Cookie Jar","Do the hardest thing first every morning. The first hour determines the day","Your mind is the governor, not your body. Override it with evidence from past victories","Write your weaknesses on your mirror. Confront them daily. You can't fix what you won't face"], resources: [{title:"Can't Hurt Me: Master Your Mind and Defy the Odds",author:"David Goggins",year:2018,summary:"Part memoir, part manual. Covers his childhood abuse, his transformation from 297-lb exterminator to Navy SEAL, and his ultra-endurance feats. Each chapter ends with challenges and actionable exercises. The audiobook includes podcast-style commentary between chapters."},{title:"Never Finished: Unshackle Your Mind and Win the War Within",author:"David Goggins",year:2022,summary:"The sequel. Goes deeper into his ongoing struggles (undiagnosed hole in his heart, near-death experiences, continuing mental battles). Argues that you're never finished — the work never ends. Darker and more raw than Can't Hurt Me."},{title:"The Joe Rogan Experience #1212 — David Goggins",author:"Joe Rogan / David Goggins",year:2019,summary:"The interview that introduced Goggins to millions. 2.5 hours covering his entire story. Goggins's intensity is even more compelling in video than in text. Watch this if you want to understand why people become obsessed with Goggins."}], rule: "When you think you're done, you're at 40%. Reach into the Cookie Jar and keep going." },
      { title: "Jocko Willink — Extreme Ownership", tag: "Leadership", insight: "Navy SEAL commander (Task Unit Bruiser — the most decorated special operations unit in the Iraq War). BJJ black belt. Teaches that leaders own everything that happens in their world — no excuses, no blame, no exceptions.", who: "Born 1971. Enlisted as a Navy SEAL (1990), commissioned as an officer (1999). Commanded SEAL Team 3 Task Unit Bruiser in Ramadi (2006) — the deadliest sector of the Iraq War. Unit had zero fatalities under his command (extraordinary given the area). Silver Star, Bronze Star with valor. After retiring (2010), co-founded Echelon Front (leadership consulting). Wrote Extreme Ownership (2015) with his platoon commander Leif Babin. Hosts the Jocko Podcast (weekly, 3+ hour episodes). Wakes at 4:30am and posts a photo of his watch to Instagram daily. Writes children's books about warrior virtues.", beliefs: [{label:"Extreme Ownership",desc:"The leader owns everything in their world. If the team fails, the leader failed. Not partly, not mostly — completely. There are no bad teams, only bad leaders."},{label:"Discipline equals freedom",desc:"Discipline is not the opposite of freedom — it is the PATH to freedom. Waking up at 4:30am gives you freedom from the rushed morning. Training gives you freedom from weakness. Discipline in spending gives you financial freedom."},{label:"Default aggressive",desc:"When in doubt, attack. Hesitation kills more missions than bad decisions. Make a decision, execute it, adjust if wrong. Inaction is the only unacceptable option."},{label:"There is no such thing as a 'bad team'",desc:"Any team can become high-performing under the right leader. The leader creates the culture, sets the standard, and enforces accountability. Blaming the team is blaming the leader."}], workStyle: "4:30am wake (posts watch photo to Instagram to build accountability). Morning workout (often BJJ or lifting) immediately. Checks emails/texts only after workout. Reads history/military/naval books — voracious reader. Weekly podcast (3+ hours, unedited, deep dives on books, battles, and leadership). Simplifies everything: 'If it's complicated, you don't understand it yet.' Echelon Front runs leadership seminars worldwide. Has a detached, almost zen calm — his demeanor in combat was famously unflappable.", techniques: [{name:"Cover and Move",desc:"Every team is a team of teams. Departments must support each other like fire teams in combat. When one team advances, the other covers. Competition between internal teams is a leadership failure."},{name:"Prioritize and Execute",desc:"When multiple problems hit simultaneously, don't panic. Don't try to solve everything at once. Identify the highest priority problem. Solve it. Then move to the next. 'Relax. Look around. Make a call.'"},{name:"Decentralized Command",desc:"The leader at the top can't make every decision. Train your subordinate leaders to understand the commander's intent so they can make decisions independently. 'Everyone must know not just what to do, but WHY.'"}], failures: "Multiple combat missions that went sideways. Friendly fire incident (covered in Extreme Ownership) — a blue-on-blue engagement during Ramadi that he took full ownership of, even though the immediate error was made by a subordinate. 'I could have communicated better. I could have planned more thoroughly. The failure was mine.' Jocko and Leif lost multiple SEAL teammates in combat (Chris Kyle, Marc Lee, Mike Monsoor, Ryan Job). His response to loss: mission first, grief later. Process pain through discipline, not indulgence.", takeaways: ["Own everything in your world. If there's a problem, ask 'What could I have done differently?'","Discipline is the root of all freedom — discipline in one area bleeds into all areas","When overwhelmed: Prioritize and Execute. One problem at a time","Simplify. If you can't explain it simply, you don't understand it well enough"], resources: [{title:"Extreme Ownership: How U.S. Navy SEALs Lead and Win",author:"Jocko Willink and Leif Babin",year:2015,summary:"Leadership manual built from SEAL combat experience. Alternates between combat stories (Ramadi) and business application. Covers Cover and Move, Simple, Prioritize and Execute, and Decentralized Command. The single best leadership book from a military perspective."},{title:"The Dichotomy of Leadership",author:"Jocko Willink and Leif Babin",year:2018,summary:"Sequel to Extreme Ownership. Balances the first book: when to lead vs. follow, when to be aggressive vs. cautious, when to hold the line vs. yield. More nuanced than Extreme Ownership."},{title:"Discipline Equals Freedom: Field Manual",author:"Jocko Willink",year:2017,summary:"Short, direct, almost poetic. Each page is a single idea. Designed to be read in the morning before the day starts. Contains Jocko's workout templates, diet principles, and morning routine. Less book, more operating manual."}], rule: "There are no bad teams, only bad leaders. Own everything in your world — no excuses." },
      { title: "Kobe Bryant — Mamba Mentality", tag: "Athlete", insight: "5x NBA champion, 2x Finals MVP, 2008 MVP, 18x All-Star, 2x Olympic gold. Scored 81 points in a single game (2nd all-time). His work ethic was so extreme it became its own philosophy: Mamba Mentality.", who: "Born 1978 in Philadelphia. Son of NBA player Joe 'Jellybean' Bryant — grew up in Italy (age 6-13), learned basketball fundamentals from European coaches and soccer from Italian kids. Entered the NBA straight out of high school (1996, 13th pick). Won the dunk contest at 18. Played 20 seasons — all with the LA Lakers. Tore his Achilles at 34 — came back, scored 60 in his final game at age 37. Won an Oscar (Dear Basketball, 2018). Died in a helicopter crash with his daughter Gianna (January 26, 2020) at age 41. His death caused global mourning — not just for the athlete, but for the father and the relentless craftsman.", beliefs: [{label:"Mamba Mentality is not about winning — it's about the process",desc:"It's the obsessive pursuit of being 0.1% better every day. It's loving the boring repetition that others avoid. It's the process itself being the reward."},{label:"If you're going to do something, be great at it",desc:"Not good. Not very good. Great. Kobe didn't understand half-effort. If something wasn't worth doing extremely well, it wasn't worth doing."},{label:"Rest at the end, not in the middle",desc:"You can rest when you're done. When you're working, work. Kobe's 4am workouts became legend — not because he wanted to be a legend, but because he genuinely wanted the work."},{label:"Study the greats, then surpass them",desc:"Kobe cold-called Michael Jordan at 1am to ask about footwork. He studied the footwork of soccer players. He watched tape of every guard who ever guarded him. He studied obsessively, then installed one move at a time."}], workStyle: "Kobe's routine was the stuff of legend: 4am wake, workout from 4:30-6:30am, take kids to school, return for 9am-11am workout, shoot 400-800 jumpers (MADE shots, not attempts — he didn't leave until he'd MADE 400). Evening: another workout. Studied tape for hours (his own games, opponents, greats of the past). Cold-called successful people (MJ, CEOs, artists) and interviewed them. Slept in 2-3 hour blocks (biphasic sleep) to maximize training time. Treated every practice like a game. Demanded the same intensity from teammates — which made him difficult to play with but elevated everyone.", techniques: [{name:"Install One Move at a Time",desc:"Watch tape of the greats. Find ONE move. Installed it into your repertoire. Practice it until it's automatic. Then find the next move. Kobe 'stole' MJ's fadeaway, Hakeem's dream shake, and Jerry West's pull-up, then made them his own."},{name:"The 4am Workout",desc:"Wake before everyone else. Get a full workout in before the world is awake. This gives you an extra workout per day (3-a-days instead of 2-a-days). Over a 20-year career, those extra sessions compound into an unbridgeable gap."},{name:"Detail Orientation",desc:"Kobe didn't just practice 3-pointers. He practiced specific scenarios: down 2 with 10 seconds left, defender closing out from the left, ball handling with left hand, shooting off the right foot. Specificity creates mastery."},{name:"Mentorship as Learning",desc:"Kobe mentored younger players intensely — but he said he learned as much from teaching as they did from being taught. The best way to understand something deeply is to explain it to someone else."}], failures: "2004 NBA Finals: the heavily-favored Lakers (with Shaq, Malone, Payton) lost to the Pistons in 5 games. Kobe shot 38% and took criticism for being a ball-hog. 2003-04: sexual assault accusation in Colorado (case dropped, civil settlement). His marriage nearly ended. Lost sponsorships. 2013: tore his Achilles — many thought his career was over. Response to 2004: completely rebuilt his game. Became a facilitator. Added a post game. Won two more championships (2009, 2010) — without Shaq. Response to 2013: methodically rebuilt his body at 34, returned to play 3 more seasons, scored 60 points in his final game. Response to the Colorado case: never spoke publicly in detail, but visibly became a better father and more intentional person. Post-playing career focused on coaching his daughter Gigi's team and storytelling.", takeaways: ["Install one move at a time from the greats. Master it. Then install the next","The 4am start is not about being tough — it's about getting an extra practice session every day, compounding over decades","Be specific in practice. 'Shooting 3-pointers' is lazy. 'Catch and shoot 3s from the right corner, defender closing out from the left, off one dribble' is practice","Cold call your heroes. The worst they can say is no. The best they can do is change your life"], resources: [{title:"The Mamba Mentality: How I Play",author:"Kobe Bryant",year:2018,summary:"Large-format book with photographs. Kobe walks through his approach to the game, specific techniques, and his philosophy. Each photo has Kobe's commentary on the moment, what he was thinking, and what he'd do differently. Beautiful and practical."},{title:"Kobe: The Interview (various)",author:"Various (YouTube: The Pat McAfee Show, Knuckleheads, Jimmy Kimmel)",year:"2015-2019",summary:"Kobe's long-form interviews post-retirement reveal his analytical mind. Particularly recommended: his appearance on The Corp with Alex Rodriguez, and his 2017 TED Talk. See the detail with which he analyzes everything."},{title:"Dear Basketball (animated short)",author:"Kobe Bryant and Glen Keane",year:2017,summary:"Animated short film of Kobe's retirement poem. Won the Academy Award (2018). 5 minutes. Shows his love for the craft itself — not the fame, not the money, just the game. Beautifully captures why he worked the way he worked."}], rule: "Study the best, install one move, repeat forever. The process IS the reward." },
      { title: "Michael Jordan — Competitive Fire", tag: "Athlete", insight: "6x NBA champion, 6x Finals MVP, 5x MVP, 10x scoring champion, 2x Olympic gold. The most ferocious competitor in modern sports history. Turned every slight — real or imagined — into rocket fuel.", who: "Born 1963 in Brooklyn, raised in Wilmington, NC. Cut from his high school varsity team as a sophomore (5'10\") — he cried in his room, then resolved it would never happen again. Grew to 6'6\" in college. Hit the game-winning shot for UNC in the 1982 NCAA Championship. Drafted #3 by the Chicago Bulls (1984). Won Rookie of the Year. Broken foot (1986) — scored 63 points in a playoff game in his return. Won 3 straight championships (1991-93). Father murdered (1993) — retired from basketball, played minor league baseball. Returned (1995), won 3 more straight championships (1996-98). The 'Flu Game' (1997). The 'Last Shot' (1998). Retired again (1999), came back with the Wizards at 38 (2001), scored 40+ at age 40. Now owns the Charlotte Hornets and a NASCAR team.", beliefs: [{label:"I've failed over and over and over again in my life — and that is why I succeed",desc:"Failure isn't the opposite of success — it's the prerequisite. Jordan took more game-winning shots than anyone. He missed more than anyone, too."},{label:"Take everything personally",desc:"Real or imagined slights were fuel. Opposing coach didn't say hi? Fuel. Teammate got more attention? Fuel. Media picked someone else as better? Fuel. Jordan treated everything as a personal challenge."},{label:"The game is won before it's played",desc:"Preparation determines outcome. Jordan prepared more intensely than anyone. The game was decided in the 5am workouts, not the 7pm tipoff."},{label:"Compete in everything",desc:"Jordan couldn't turn it off. Ping-pong, golf, cards, who could eat a bag of chips fastest — everything was a competition, and he needed to win."}], workStyle: "5am workouts during the season. 'Breakfast Club' — an invitation-only morning workout group (Jordan, a few chosen teammates, the trainer). No coaches allowed. No media. Just work. After practice, he'd stay an extra hour playing 1-on-1 or HORSE. Studied opponents obsessively. Legendary trash talk — psychological warfare was part of the game. Post-game: ice bath, massage, film study. Offseason: the real training. Added specific skills every summer (post game, left hand, fadeaway, defense). Competitive in everything — from golf to poker to who could eat lunch fastest.", techniques: [{name:"Turn Slights Into Fuel",desc:"Find the disrespect — real or perceived — and use it. Jordan invented slights his opponents never intended. He'd convince himself an opponent had disrespected him, then destroy them. 'That's all I needed. If you gave me a reason, I'd find a way to use it.'"},{name:"The Breakfast Club",desc:"Create an exclusive morning ritual for the most dedicated people on your team. Make it by invitation only. No management. No media. The people who show up at 5am are the people you build around."},{name:"Specialization by Summer",desc:"Every offseason, add ONE new skill. Summer '91: post game. Summer '94 (during baseball): maintained basketball through mental reps. Summer '95: got into the best shape of his life. Summer '97: perfected the fadeaway. One summer, one skill, mastery."}], failures: "Cut from his high school varsity team (age 15). The most famous 'failure' in sports history — and the one that Jordan himself credits for everything. 'I was devastated. I went to my room and cried. Then I decided that from that day forward, I was going to prove to everyone that I belonged.' 1995 playoffs: lost to the Orlando Magic after returning from baseball (the 'He's back' series). Nick Anderson stole the ball from him in a crucial moment. The NEXT night, Jordan wore #45 again — and scored 38. The following season, he was back to #23 and the Bulls won a record 72 games.", takeaways: ["Turn every slight into fuel — invented ones work just as well as real ones","Add one new skill per season/summer. Mastery is accumulation over time","Create an exclusive, voluntary 'breakfast club' for your most dedicated people","The best revenge is performance. Don't respond with words — respond with results"], resources: [{title:"The Last Dance (documentary)",author:"ESPN/Netflix, directed by Jason Hehir",year:2020,summary:"10-part documentary on the 1997-98 Bulls season with Jordan's full participation. Covers his entire career. The definitive visual record of Jordan's competitive intensity. Watch for the training montages and the behind-the-scenes psychology."},{title:"Playing for Keeps: Michael Jordan and the World He Made",author:"David Halberstam",year:1999,summary:"The best-written book on Jordan, by one of America's greatest journalists (Pulitzer Prize winner). Contextualizes Jordan within the NBA's rise and American culture. Not just about Jordan — about what Jordan meant."},{title:"Michael Jordan: The Life",author:"Roland Lazenby",year:2014,summary:"The most comprehensive biography (700+ pages). Deep on Jordan's childhood in North Carolina, his family dynamics, and his post-playing career. More thorough than Halberstam, though less elegantly written."}], rule: "Turn every slight into fuel. Prepare so hard the game is won before it starts." },
