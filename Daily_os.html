      { title: "Sleep Architecture — What Happens While You Sleep", tag: "Physiology", insight: "Sleep is not one state — it's a repeating 90-minute cycle of 4 stages, each with distinct functions for brain and body.", details: ["Stage 1-2 (light sleep): ~50% of total sleep. Memory consolidation begins, heart rate slows","Stage 3-4 (deep/slow-wave): ~20% of total. GH release, tissue repair, immune function. Hard to wake from","REM: ~25% of total. Emotional processing, creativity, learning integration. Brain is as active as awake","Full cycle = ~90 min. 4-6 cycles/night = 6-9 hours. Waking at end of cycle = feel refreshed. Mid-cycle = groggy"], note: "Wake up at the same time every day. Let bedtime vary slightly to match your sleep need. Consistency of wake time is more important than consistency of bed time for circadian entrainment." },
      { title: "Circadian Entrainment — Setting Your Internal Clock", tag: "Rhythm", insight: "Your circadian rhythm is a ~24.2-hour internal clock that MUST be reset daily by external cues (zeitgebers). The strongest zeitgeber is light.", details: ["Morning sunlight (within 30 min of waking): sets cortisol peak and melatonin release timer. Non-negotiable","Evening light restriction: dim red/amber lights after 9pm. Overhead lights off. Screens on night mode + low brightness","Temperature: core body temp must drop ~1°C for sleep onset. Hot bath/shower 90 min before bed accelerates this","Eating window: consistent meal timing reinforces peripheral clocks (liver, gut, muscle). Avoid large meals 2-3h before bed"], note: "Morning sunlight + evening darkness = the cheapest, most effective sleep intervention. Everything else is optimization on top of this foundation." },
      { title: "Recovery Metrics — What to Track", tag: "Tracking", insight: "Subjective feel is valuable but biased. Objective metrics catch trends before you feel them. HRV is the single best recovery metric.", details: ["HRV (heart rate variability): higher = more recovered. Track morning HRV consistently (same position, same time)","Resting HR: rising trend over 3-5 days = accumulating fatigue, possible overtraining or illness","Sleep efficiency: time asleep / time in bed. >85% is good, >90% is excellent","Grip strength: simple, reliable CNS readiness test. Drop of >5% from baseline = not fully recovered"], note: "Don't obsess over daily numbers. Look at weekly trends. One bad HRV day is noise; three declining days is a signal to back off." }
    ]
  },
  weekly: {
    title: "Weekly Protocol — Science Behind Each Day",
    subtitle: "Your 7-day architecture explained: why each day exists, the mechanism it targets, and how they connect",
    items: [
      { title: "MON — Upper Strength A", tag: "Strength", insight: "Chest · Back · Shoulders · Rotator Cuff. Start the week with upper body strength. Fresh CNS → highest quality heavy pressing and pulling.", details: ["Monday upper strength sets the tone: high neural demand work when you're most recovered","Prioritize compound presses and pulls (bench/OHP/row/pull-up) before isolation work","Rotator cuff work is non-negotiable at 6'4\" — longer humerus = more torque on shoulder joint","Volume: 12-16 hard working sets. RPE 7-9. Rest 2-3 min between compounds"], note: "Monday is about setting the standard for the week. One high-quality session creates momentum that carries through Thursday." },
      { title: "TUE — Power + Cardio", tag: "Power/Cardio", insight: "Zone 2 base building + explosive power work + pool recovery. High movement variety, moderate CNS demand.", details: ["Zone 2: 45-60 min at conversational pace. Building mitochondrial density and fat oxidation","Landing mechanics: depth drops, low box jumps. Training force absorption before force production","Pool recovery: hydrostatic pressure reduces inflammation, active recovery flushes metabolites","This is your highest movement-variety day — the goal is exposure, not exhaustion"], note: "Tuesday bridges Monday's strength with Wednesday's lower body work. It's a 'quality recovery' day — training that enhances rather than depletes." },
      { title: "WED — Lower Strength", tag: "Strength", insight: "Quads · Hamstrings · Glutes · Tendons. Midweek lower body session — the most systemically demanding session of the week.", details: ["Lower body compounds create the largest hormonal response (T and GH elevation post-training)","Prioritize heavy bilateral work (squat/deadlift variation) early, unilateral work (split squat/lunge) later","Tendon-specific work: heavy slow resistance for patellar and Achilles tendons","Tall lifter: longer femurs = more forward lean in squat = more demand on posterior chain. This is a feature, not a bug"], note: "Wednesday is the hardest day. Eat accordingly, sleep accordingly. This session drives the majority of your weekly strength adaptation." },
      { title: "THU — Power + Cardio", tag: "Power/Cardio", insight: "VO2max intervals + explosive power + agility. The most intense cardiovascular day targeting the top end of your aerobic capacity.", details: ["VO2max intervals: 4×4 min at 90-95% HRmax with 3 min active recovery. The gold standard protocol","Explosive power: contrast training — heavy lift immediately followed by ballistic movement (post-activation potentiation)","Agility: directional changes, reactive drills. Trains neuromuscular coordination under fatigue","This is the only truly 'hard' cardio day of the week. Everything else is base or recovery"], note: "Thursday VO2max work pushes your ceiling. Zone 2 on Tuesday pushes your floor. Together they expand your entire aerobic capacity range." },
      { title: "FRI — Upper Strength B", tag: "Strength", insight: "Shoulders · Arms · Isometrics · GH Sauna. Second upper body session with different emphasis — more isolation, more metabolic stress.", details: ["Different exercise selection from Monday. If Monday was horizontal press, Friday is vertical. If Monday was heavy pull-ups, Friday is rows","Shoulder emphasis: lateral delts, rear delts, rotator cuff. Broader shoulder girdle = better injury resilience","Isometric finishers: overcoming isos for joint health and tendon conditioning at end ranges","GH sauna: post-workout heat exposure (15-20 min, 80-90°C) for GH pulse — 16-fold increase documented with 2×20 min sessions"], note: "Friday is 'quality over quantity' — you're accumulated fatigue from the week. Make every set count. Leave the gym feeling worked, not wrecked." },
      { title: "SAT — Active + Environmental", tag: "Active", insight: "Long Zone 2 · PNF stretching · Wim Hof breathing · Cold exposure. A day of deliberate active recovery and environmental hormesis.", details: ["Long Zone 2: 60-90+ min. The extended duration is the stimulus — mitochondrial adaptation scales with time in zone","PNF stretching: full-body session. 2-3 rounds per major muscle group. Recovery between stretches","Wim Hof: 3-4 rounds breathing + cold exposure (cold shower, ice bath, or outdoor cold). Hormetic stress + autonomic reset","This is your 'lab day' — experiment with protocols, listen to your body, enjoy the process"], note: "Saturday is the most important day for long-term sustainability. It proves that training is not punishment — it's a practice you return to because it makes you feel alive." },
      { title: "SUN — Rest + Restore", tag: "Rest", insight: "Full recovery · Meal prep · Weekly review · Planning. This is not an off day — it's an active investment in next week's performance.", details: ["Complete rest from structured training. Walking, gentle stretching, and mobility are encouraged","Meal prep: 1-2 hours batch cooking. Set yourself up for nutritional success Mon-Fri","Weekly review: what worked? What didn't? Adjust next week's plan accordingly. 15 minutes of planning saves hours of confusion","Sleep priority: get to bed early. Sunday night sleep quality determines Monday morning training quality"], note: "The people who burn out are the ones who never rest. The people who last decades are the ones who treat rest as training — deliberate, structured, non-negotiable." }

<script>
var mealsData = {
  medicinal: {
    title: "Medicinal Foods — Deep Dives",
    subtitle: "15 foods with peer-reviewed mechanisms. Not superfoods — just biochemistry you can leverage.",
    items: [
      { title: "Blueberries — BDNF & Anthocyanins", tag: "Neuroprotection", insight: "Anthocyanins cross the blood-brain barrier and accumulate in hippocampus — the memory and learning center. Upregulates BDNF (brain-derived neurotrophic factor).", details: ["Anthocyanins → BDNF ↑ → neurogenesis and synaptic plasticity","Blue/purple pigment = the active compound. Frozen = same anthocyanin content as fresh","0.5-1 cup/day shows cognitive effects in human trials","Also: vasodilation via NO pathway — improves cerebral blood flow"], note: "Frozen wild blueberries have highest anthocyanin density. Add to oats or post-workout shake daily." },
      { title: "Broccoli Sprouts — Sulforaphane & Nrf2", tag: "Detoxification", insight: "3-5 day old broccoli sprouts contain 20-50x more sulforaphane glucosinolate than mature broccoli. Sulforaphane is the most potent natural Nrf2 activator known.", details: ["Nrf2 = master transcription factor for antioxidant genes. Sulforaphane turns it on","Also upregulates phase II detoxification enzymes in the liver","Heat destroys myrosinase (the enzyme that converts glucoraphanin → sulforaphane). Eat raw or lightly steamed","50g/day (small handful) = clinically relevant dose"], note: "Grow your own sprouts (takes 3-5 days, costs pennies). Add to salads, eggs, or eat straight. This is one of the highest-ROI nutrition interventions available." },
      { title: "Fatty Fish (Salmon, Sardines, Mackerel) — DHA & EPA", tag: "Structural Fat", insight: "DHA is the most abundant fatty acid in the brain. EPA competes with arachidonic acid for COX/LOX enzymes → reduces inflammatory eicosanoids. Both are essential — humans can't synthesize them efficiently.", details: ["Brain is ~60% fat; DHA is ~25% of that. You ARE what you eat, literally","EPA:DHA ratio matters: 2:1 or 1:1 for anti-inflammatory effect","Wild salmon = better fatty acid profile + less contaminants than farmed","Small fish (sardines, anchovies) = lowest heavy metal load + highest nutrient density"], note: "2-3 servings/week. Sardines are the most underrated — cheap, shelf-stable, nutrient-dense, lowest on the food chain (least mercury)." },
      { title: "Eggs (Whole) — Choline & Phosphatidylcholine", tag: "Neurotransmitter", insight: "Choline is the precursor to acetylcholine — the neurotransmitter that drives muscle contraction, memory encoding, and REM sleep regulation. Egg yolks are the richest dietary source.", details: ["One egg = ~150mg choline. AI: 550mg/day. 3-4 eggs covers most of requirement","Also: lutein and zeaxanthin for eye health (macular pigment density)","Dietary cholesterol in eggs does NOT raise serum cholesterol in most people (decades of data)","Pasture-raised eggs: 2-3x more omega-3, vitamin D, and vitamin E vs conventional"], note: "Eat the whole egg. The yolk contains all the choline, all the fat-soluble vitamins, and most of the protein. Egg whites alone = protein with no cofactors." },
      { title: "Grass-Fed Beef — Zinc, B12, Creatine, Carnitine", tag: "Micronutrient Density", insight: "Ruminant meat is the most nutrient-dense food per gram. Grass-fed has better fatty acid profile (more CLA, more omega-3) and higher fat-soluble vitamin content.", details: ["Zinc: rate-limiting for testosterone synthesis. Beef is the richest source","B12: exclusive to animal foods. Required for myelin sheath maintenance and RBC production","Creatine: ~2-5g per kg of beef. Additional to your supplemented 10g","Carnitine: transports fatty acids into mitochondria for beta-oxidation"], note: "Quality matters. Grass-fed, grass-finished = significantly better fatty acid profile. But even conventional beef is nutrient-dense. Don't let perfect be the enemy of good." },
      { title: "Leafy Greens (Spinach, Kale, Arugula) — Nitrates & Folate", tag: "Vascular", insight: "Dietary nitrates → nitrite → nitric oxide. NO is a gaseous signaling molecule that vasodilates blood vessels, improving blood flow, oxygen delivery, and blood pressure regulation.", details: ["Nitrate → NO pathway is independent of arginine → NO pathway. Both matter","Also: folate (methylation, DNA synthesis), vitamin K1 (clotting), magnesium (300+ reactions)","Arugula has highest nitrate content of common greens (480mg/100g)","Cooked spinach = more bioavailable iron and calcium. Raw = more vitamin C and folate"], note: "Large handful with at least 2 meals/day. Rotate greens for diverse phytonutrient exposure. Arugula + olive oil + lemon = nitrate delivery system." },
      { title: "Avocado — Monounsaturated Fat & Lutein", tag: "Hormone Support", insight: "Monounsaturated fat supports testosterone production (Leydig cells need cholesterol). Lutein accumulates in the retina and brain — associated with cognitive preservation with age.", details: ["One avocado = ~20g monounsaturated fat + 10g fiber","Also: potassium (more than bananas), vitamin K, folate, vitamin E","Lutein bioavailability from avocado is higher than from supplements (fat matrix aids absorption)","The fat in avocado increases carotenoid absorption from other foods eaten at the same meal"], note: "Half to one full avocado daily. Adds 200-300 calories of hormone-supportive fat + fiber to keep you full." },
      { title: "Walnuts — Plant DHA & Polyphenols", tag: "Brain Structure", insight: "Walnuts have the highest omega-3 (ALA) content of any nut. ALA converts to EPA/DHA at ~5-10% efficiency — not a replacement for fish oil, but complementary.", details: ["Polyphenols in the skin (pellicle) are the most antioxidant-dense part — don't remove it","Also: melatonin (yes, in walnuts), magnesium, phosphorus","Walnuts improve endothelial function and reduce inflammatory markers in RCTs","The only nut with significant omega-3 content"], note: "1 oz (28g, ~14 halves) daily. Add to yogurt, oatmeal, or eat as snack. The skin is bitter — that's the polyphenols. Eat it." },
      { title: "Lion's Mane Mushroom — NGF Stimulation", tag: "Neurogenesis", insight: "Hericenones and erinacines in Lion's Mane cross the blood-brain barrier and stimulate Nerve Growth Factor (NGF) synthesis. NGF promotes survival, maintenance, and regeneration of neurons.", details: ["Erinacines (from mycelium) are smaller molecules → better BBB penetration than hericenones (fruiting body)","Human evidence: 3g/day for 16 weeks improved cognitive function in mild cognitive impairment (Japanese RCT)","Also: beta-glucans for immune modulation, anxiolytic effects in animal models","Not psychedelic — zero psychoactivity. Mechanism is growth factor stimulation, not receptor binding"], note: "1-3g/day extract (standardized to >25% beta-glucans). Or cook fresh: slice and sauté until edges are crispy — the water content is high, you need to cook it out." },
      { title: "Beets & Beetroot — Nitrate → NO Pathway", tag: "Performance", insight: "Beets are the richest dietary source of nitrates. Nitrate → nitrite → nitric oxide → vasodilation → improved blood flow, reduced O2 cost of exercise, and lower blood pressure.", details: ["Nitrate → NO conversion is enhanced by oral bacteria. Don't use antibacterial mouthwash — it kills nitrate-reducing bacteria","Performance effect: 2-8% improvement in time to exhaustion, ~3% in time trial performance","Peak plasma nitrate at ~2-3 hours post-consumption. Time accordingly before training/competition","500ml beet juice or 2 medium beets = ~6-8 mmol nitrate = clinically effective dose"], note: "Beet juice 2-3 hours before training for performance. Or daily cooked beets for blood pressure. Your oral microbiome is part of the pathway — protect it." },
      { title: "Pomegranate — Urolithin A & Mitophagy", tag: "Longevity", insight: "Pomegranate ellagitannins are converted by gut bacteria to urolithin A — a molecule that triggers mitophagy: the selective degradation of damaged mitochondria. Healthy mitochondria = healthy aging.", details: ["Urolithin A activates mitophagy via PINK1/Parkin pathway — same pathway that exercise activates","Only ~40% of people can convert ellagitannins to urolithin A (gut microbiome dependent)","Pomegranate also: punicalagins (potent antioxidants), nitric oxide support (like beets)","Juice = concentrated but loses fiber. Whole seeds = fiber + full phytonutrient spectrum"], note: "If you don't convert to urolithin A, you still get the nitrate/antioxidant benefits. The seeds are the most under-consumed part — eat them whole, they're edible and fiber-rich." },
      { title: "Cruciferous Vegetables (Broccoli, Cabbage, Kale, Brussels Sprouts) — I3C/DIM", tag: "Hormone Metabolism", insight: "Indole-3-carbinol (I3C) converts to DIM (diindolylmethane) in the stomach. DIM modulates estrogen metabolism — favoring the 2-hydroxy pathway (protective) over the 16-alpha pathway (proliferative).", details: ["I3C → DIM → shifts estrogen metabolism toward 2-OHE (less proliferative, more protective)","Also: sulforaphane (Nrf2), glucosinolates (detox enzymes), fiber (gut health)","Cancer epidemiology: cruciferous vegetable intake consistently associated with reduced cancer risk (especially colorectal, lung, breast)","Cooking reduces I3C but increases sulforaphane availability (with mustard powder) — eat both raw and cooked"], note: "2+ servings daily from diverse cruciferous sources. Raw broccoli sprouts + cooked broccoli + fermented cabbage (sauerkraut/kimchi) = full spectrum coverage." },
      { title: "Fermented Foods (Kimchi, Sauerkraut, Kefir, Yogurt) — Gut-Brain Axis", tag: "Microbiome", insight: "Fermented foods provide live microorganisms that modulate the gut-brain axis — the bidirectional communication between enteric nervous system and CNS. A healthy gut = better mood, cognition, and immune function.", details: ["Stanford RCT (2021): 6 servings/day of fermented foods increased microbiome diversity and reduced 19 inflammatory markers","Unlike probiotic pills (1-10 strains), fermented foods contain dozens to hundreds of strains","Vitamin K2 (menaquinone) from bacterial fermentation: directs calcium to bones, away from arteries","Gut produces 90% of serotonin and 50% of dopamine — your microbiome is a neurotransmitter factory"], note: "Start with 1 serving/day and build up. Too much too fast = GI discomfort. Sauerkraut/kimchi with meals, kefir/yogurt as snack. Diversity of sources > quantity of one source." },
      { title: "Bone Broth & Collagen — Glycine & Connective Tissue", tag: "Structural", insight: "Bone broth provides glycine, proline, hydroxyproline, and gelatin — the amino acid building blocks for collagen synthesis. Glycine is also a neurotransmitter (inhibitory, calming) and a precursor to glutathione.", details: ["Glycine: we synthesize ~3g/day but need ~15g/day for optimal collagen turnover and glutathione synthesis. The gap comes from diet","Gelatin/collagen: provides the specific amino acids for connective tissue — tendons, ligaments, skin, gut lining","Homemade bone broth: simmer bones + connective tissue for 12-48 hours. Vinegar helps mineral extraction","Collagen powder is more convenient: 15-20g hydrolyzed collagen peptides + 50mg vitamin C 30-60 min before training (Baar protocol)"], note: "Bone broth is food, not medicine. Collagen powder is more concentrated and convenient. Pair with vitamin C — it's an essential cofactor for collagen cross-linking." },
      { title: "Coconut & MCTs — Ketones as Brain Fuel", tag: "Metabolic", insight: "Medium-chain triglycerides (C8, C10, C12) are absorbed directly into portal circulation and converted to ketones by the liver — bypassing the normal fat digestion pathway. Ketones are an alternative brain fuel to glucose.", details: ["C8 (caprylic acid) is the most ketogenic MCT. C12 (lauric acid) has antimicrobial properties","Ketones can supply up to 60-70% of brain energy during glucose scarcity","MCT oil: start with 5ml (1 tsp)/day, build to 15-30ml. Too much too fast = GI disaster","Coconut oil = ~15% MCT. MCT oil = 100% MCT. Different tools for different purposes"], note: "1 tbsp coconut oil or MCT oil in morning coffee (with protein/fat breakfast). Increases ketones within 30-60 min. Don't overdo it — your gut will tell you when you've exceeded your limit." },
      { title: "Ginger — Gingerols & Digestive Fire", tag: "Anti-inflammatory", insight: "Gingerols and shogaols are potent anti-inflammatory compounds that inhibit COX-2 and LOX pathways — same mechanism as NSAIDs but without the gut damage. Also accelerates gastric emptying.", details: ["[6]-gingerol is the primary bioactive: analgesic, anti-nausea, thermogenic","Reduces muscle pain from exercise by ~25% in RCTs (daily consumption, 2g raw ginger)","Gastric emptying: accelerates by 30-50% — reduces bloating and post-meal lethargy","Fresh > dried > powdered. Heat increases shogaol conversion (more pungent, different effects)"], note: "2-3g fresh ginger daily (thumb-sized piece). Grate into hot water + lemon + honey = morning digestive tonic. Or add to stir-fries and smoothies." },
      { title: "Turmeric — Curcumin & The Absorption Problem", tag: "Anti-inflammatory", insight: "Curcumin is one of the most researched anti-inflammatory compounds. Problem: it has near-zero bioavailability alone. The fix: combine with black pepper (piperine) + fat — absorption increases 2,000%.", details: ["Curcumin inhibits NF-kB — the master inflammatory transcription factor","Without piperine: curcumin is glucuronidated in the liver and excreted within hours","With 5-20mg piperine: bioavailability increases 20-fold. With fat: additional boost","Effective for: joint pain, post-exercise inflammation, metabolic health, BDNF upregulation"], note: "1 tsp turmeric + pinch black pepper + 1 tsp coconut oil or ghee = bioavailable golden paste. Add to rice, soups, or warm milk. Supplements only worth it if they include piperine or are liposomal." },
      { title: "Cloves — Eugenol & The ORAC King", tag: "Antioxidant", insight: "Cloves have the highest ORAC (Oxygen Radical Absorbance Capacity) score of any food tested — higher than blueberries, pomegranate, or any other 'superfood.' The active compound is eugenol.", details: ["ORAC score: 290,000+ per 100g. For comparison: blueberries = ~4,600. 60x higher","Eugenol is antimicrobial, antifungal, local anesthetic (historically used for tooth pain)","Also: manganese (essential for bone and collagen synthesis), vitamin K","Small amounts go a long way: 1-2 cloves = significant antioxidant punch. Strong flavor — use strategically"], note: "1-2 whole cloves in tea, rice, or oatmeal. Or ground clove (1/4 tsp) in spice blends. Powerful flavor — don't overdo it. The oil is extremely potent — dilute if using topically." },
      { title: "Cinnamon — Insulin Sensitizer & Blood Sugar Modulator", tag: "Metabolic", insight: "Cinnamon (Ceylon, not cassia) contains methylhydroxychalcone polymer (MHCP) which mimics insulin and increases glucose uptake into cells. Coumarin in cassia cinnamon is hepatotoxic at high doses — always choose Ceylon.", details: ["MHCP increases glucose uptake and glycogen synthesis via GLUT4 translocation","Clinical doses: 1-6g/day reduced fasting glucose by 18-29% in diabetic RCTs","Ceylon vs cassia: cassia contains 0.4-1% coumarin (hepatotoxic). Ceylon = 0.004% (negligible)","Also: cinnamaldehyde (antimicrobial), proanthocyanidins (antioxidant)"], note: "1 tsp Ceylon cinnamon daily. Add to oatmeal, coffee, yogurt, or smoothies. If your cinnamon doesn't specify 'Ceylon,' it's probably cassia. Worth the upgrade — protect your liver." },
      { title: "Garlic — Allicin & Cardiovascular Protection", tag: "Cardiovascular", insight: "Allicin (formed when garlic is crushed/chopped and exposed to air) is responsible for garlic's cardiovascular benefits: blood pressure reduction, improved lipid profile, antiplatelet activity.", details: ["Allicin only forms when alliin and alliinase enzyme combine — this requires CRUSHING + 10 min resting before cooking","Mechanism: hydrogen sulfide (H2S) release → vasodilation → BP reduction","Meta-analysis: 600-900mg aged garlic extract reduced BP by 5-8 mmHg systolic (comparable to some drugs)","Also: antimicrobial, immune-enhancing, prebiotic (feeds gut bacteria)"], note: "Crush 1-2 cloves, let sit 10 minutes, then cook. This is the critical step — skipping it destroys the allicin. Raw in dressings is even more potent. Aged garlic extract for therapeutic dosing." },
      { title: "Green Tea (Matcha) — EGCG & Calm Alertness", tag: "Longevity", insight: "EGCG (epigallocatechin gallate) is the most bioactive catechin in green tea. Matcha = whole leaf ground = 3-5x the EGCG of steeped green tea. Combined with L-theanine for calm, focused energy.", details: ["EGCG: antioxidant, thermogenic, inhibits aromatase (protective for testosterone/estrogen balance)","Matcha: 105mg EGCG per serving vs. 30-40mg in steeped green tea","L-theanine naturally in green tea smooths the caffeine — no jitters, just clean focus","Japanese matcha > Chinese for EGCG content. Ceremonial grade = highest quality, culinary = cooking/smoothies"], note: "1 cup matcha (1 tsp) in the morning. Whisk with 80°C water (not boiling — destroys catechins). Alternative to or in rotation with coffee. Don't drink on empty stomach — tannins can cause nausea." },
      { title: "Dark Chocolate / Cacao — Flavanols & Cerebral Blood Flow", tag: "Cognitive", insight: "Cacao flavanols (epicatechin, catechin) increase cerebral blood flow via NO-mediated vasodilation. 85%+ dark chocolate or raw cacao = minimal sugar, maximal flavanol density.", details: ["Flavanols → endothelial NO production → vasodilation → increased cerebral blood flow","RCT: high-flavanol cocoa improved cognitive performance in healthy adults via improved brain oxygenation","Raw cacao = highest flavanol content. Dutch-processed cocoa = lowest (alkalization destroys flavanols)","Also: theobromine (mild stimulant, longer-acting than caffeine), magnesium, iron, fiber"], note: "20-30g 85%+ dark chocolate or 1-2 tbsp raw cacao powder daily. The darker the better. Cacao nibs on yogurt/oatmeal = crunch + flavanols + zero sugar." },
      { title: "Chia & Flax Seeds — Omega-3 ALA + Soluble Fiber", tag: "Foundation", insight: "Chia and flax are the richest plant sources of ALA (alpha-linolenic acid, omega-3 precursor). Also provide mucilaginous soluble fiber that feeds gut bacteria and slows glucose absorption.", details: ["Chia: 5g ALA per tbsp, 10g fiber. Forms gel when soaked (slows digestion, increases satiety)","Flax: 2.5g ALA per tbsp, 3g fiber. Must be GROUND — whole flax seeds pass through undigested","Ground flax lignans (SDG) have anti-estrogenic and antioxidant effects","Mucilage fiber = prebiotic + blood sugar stabilizer + satiety booster"], note: "1 tbsp ground flax + 1 tbsp chia daily. Chia: soak 10+ min in liquid. Flax: grind fresh (coffee grinder) or buy pre-ground, refrigerate. Add to oatmeal, yogurt, smoothies." },
      { title: "Raw Honey — Enzymes, Polyphenols & Wound Healing", tag: "Functional Sweetener", insight: "Raw unpasteurized honey contains glucose oxidase (produces H2O2 — antimicrobial), polyphenols, and local pollen (may help with seasonal allergies). Pasteurized honey = just sugar.", details: ["Raw honey: enzymes intact, local pollen, antimicrobial H2O2 production. Darker honey = more polyphenols","Manuka honey: standardized methylglyoxal (MGO) rating. Medical-grade wound healing evidence","Glycemic impact: fructose/glucose blend. Lower GI than table sugar but still sugar — use strategically","Pre-workout: 1 tbsp raw honey 30-60 min before = quick carbs without processed sugar crash"], note: "1 tbsp raw local honey in morning tea or pre-workout. Never heat above 40°C (destroys enzymes). Manuka for therapeutic use; local raw for daily. It's still sugar — treat it as a functional food, not a free pass." },
      { title: "Apple Cider Vinegar — Acetic Acid & Glycemic Control", tag: "Metabolic", insight: "The acetic acid in ACV slows gastric emptying, reduces postprandial glucose spike by 20-34%, and increases insulin sensitivity. The mother (sediment) contains beneficial bacteria and enzymes.", details: ["Post-meal glucose reduction: 20-34% decrease after carbohydrate-rich meals (multiple RCTs confirmed)","Mechanism: acetic acid inhibits disaccharidase enzymes → slower starch breakdown → lower glucose spike","Also: increases satiety via delayed gastric emptying, supports stomach acid production for protein digestion","Must be raw/unfiltered 'with the mother' — pasteurized ACV is just acidic water"], note: "1-2 tbsp in water before largest meal. Use a straw — the acid erodes tooth enamel. Or use in salad dressing (oil + ACV + herbs = the simplest metabolic intervention). Start with 1 tsp and build up." },
      { title: "Oregano Oil — Carvacrol & Antimicrobial Punch", tag: "Antimicrobial", insight: "Carvacrol and thymol are phenolic compounds that disrupt bacterial cell membranes. Oregano oil is one of the most potent natural antimicrobials — used strategically, not daily.", details: ["Carvacrol: disrupts bacterial membrane integrity, effective against gram-positive and gram-negative bacteria","Evidence for: SIBO management, foodborne pathogen protection, upper respiratory infections","Also: potent antioxidant (rosmarinic acid), antifungal (candida)","Extremely potent — 1 drop oregano oil = antimicrobial effect of ~1 tbsp dried oregano"], note: "NOT a daily supplement — use strategically: 1-2 drops in water when fighting infection, or 1 drop in cooking oil for antimicrobial food prep. Dilute always — pure oregano oil burns mucosa. Cycle on/off." },
      { title: "Cayenne Pepper — Capsaicin & Metabolic Rate", tag: "Thermogenic", insight: "Capsaicin activates TRPV1 receptors → sympathetic nervous system activation → increased metabolic rate, fat oxidation, and endorphin release. Also a potent analgesic when applied topically.", details: ["Metabolic boost: 50-100mg capsaicin per meal increased energy expenditure by ~50 kcal in RCT","TRPV1 activation → substance P depletion → reduced pain signaling (topical capsaicin creams are FDA-approved for neuropathy)","Also: antimicrobial (food preservation historically), increases gastric blood flow (protective, not damaging)","Tolerance builds with daily use — cycle or use intermittently for metabolic effects"], note: "Pinch of cayenne in savory meals. Start mild (1/8 tsp) and build tolerance. The burn is the mechanism — if you don't feel it, it's not activating TRPV1. Not for people with gastritis or ulcers." }
    ]
  },
  mixes: {
    title: "Daily Health Mixes — Morning, Midday, Night",
    subtitle: "Strategic food-based blends for each phase of the day. Timed for maximum absorption and effect.",
    items: [

// ============================================
// PERSISTENT STORAGE HELPERS
// ============================================
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};

async function loadKey(key) {
  try {
    const r = await window.storage.get(key);
    return r ? JSON.parse(r.value) : null;
  } catch { return null; }
}

async function saveKey(key, value) {
  try { await window.storage.set(key, JSON.stringify(value)); } catch {}
}

function useCurrentHour() {
  const [hour, setHour] = useState(new Date().getHours());
  useEffect(() => {
    const tick = setInterval(() => setHour(new Date().getHours()), 60000);
    return () => clearInterval(tick);
  }, []);
  return hour;
}

function useCurrentDay() {
  // 0=Sun, 1=Mon...
  const map = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  return map[new Date().getDay()];
}

function fmtHour(h) {
  if (h === 0 || h === 24) return "12 AM";
  if (h === 12) return "12 PM";
  return h < 12 ? h + " AM" : (h - 12) + " PM";
}

                            <div style={{ fontSize: 9, color: C.light, letterSpacing: "1.5px", marginBottom: 10, fontWeight: 600 }}>HOW TO APPLY IT</div>
                            <div style={{ background: S.surface2, border: `1px solid ${S.border}`, borderRadius: 6, padding: "10px 12px" }}>
                              <div style={{ fontSize: 12.5, color: C.text, fontStyle: "italic", lineHeight: 1.55 }}>{item.note}</div>
                            </div>
                          </>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </>
        )}

        {/* ────── SHOP ────── */}
        {panel === "shop" && (
          <>
            <h2 style={{ fontFamily: fontHead, fontSize: 24, margin: "0 0 6px" }}>Shopping List</h2>
            <div style={{ fontSize: 12.5, color: S.muted, marginBottom: 24 }}>One weekly trip · Persists across visits</div>

            {shopList.map(cat => {
              const total = cat.items.length;
              const done = cat.items.filter(i => shopState[i.id]).length;
              return (
                <div key={cat.cat} style={{ marginBottom: 26 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
                    <h3 style={{ fontFamily: fontHead, fontSize: 14, margin: 0, color: C.text, letterSpacing: "1px" }}>
                      <span style={{ color: C.light, marginRight: 8 }}>{cat.icon}</span>{cat.cat}
                    </h3>
                    <span style={{ fontSize: 10, color: S.dim, letterSpacing: "1px" }}>{done}/{total}</span>
                  </div>
                  <div style={{ fontSize: 11.5, color: S.muted, marginBottom: 12, fontStyle: "italic", lineHeight: 1.5 }}>{cat.note}</div>
                  <div style={{ display: "grid", gap: 5 }}>
                    {cat.items.map(item => {
                      const checked = !!shopState[item.id];
                      return (
                        <button key={item.id} onClick={() => toggleShop(item.id)} style={{
                          display: "flex", alignItems: "center", gap: 11,
                          padding: "10px 12px",
                          background: checked ? S.surface3 : S.surface1,
                          border: `1px solid ${checked ? S.borderStrong : S.border}`,
                          borderRadius: 8, cursor: "pointer", textAlign: "left",
                          width: "100%", color: C.text, fontFamily: fontBody,
                        }}>
                          <div style={{
                            width: 18, height: 18, borderRadius: 4,
                            border: `1.5px solid ${checked ? C.light : S.borderStrong}`,
                            background: checked ? C.light : "transparent",
                            display: "flex", alignItems: "center", justifyContent: "center",
                            flexShrink: 0, color: C.bg, fontSize: 12, fontWeight: 700,
                          }}>{checked && "✓"}</div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                              <span style={{ fontSize: 12.5, color: checked ? S.dim : C.text, textDecoration: checked ? "line-through" : "none", fontWeight: 500 }}>{item.name}</span>
                              <span style={{ fontSize: 10, color: C.light, letterSpacing: "0.5px", flexShrink: 0, fontWeight: 600 }}>{item.qty}</span>
                            </div>
                            <div style={{ fontSize: 10.5, color: S.dim, marginTop: 2 }}>{item.why}</div>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            <button onClick={() => setShopState({})} style={{
              width: "100%", background: "transparent",
              border: `1px solid ${S.border}`, borderRadius: 8,
              padding: "10px 16px", color: S.muted, fontSize: 11,
              letterSpacing: "1.5px", cursor: "pointer",
              marginTop: 16, fontFamily: fontBody,
            }}>RESET LIST</button>
          </>
        )}

        {/* ────── RULES ────── */}
        {panel === "rules" && (
          <>
            <h2 style={{ fontFamily: fontHead, fontSize: 24, margin: "0 0 6px" }}>Rules & Principles</h2>
            <div style={{ fontSize: 12.5, color: S.muted, marginBottom: 24 }}>The operating standards · The sleep fix</div>

            <SectionLabel>Do These</SectionLabel>
            <div style={{ marginBottom: 28 }}>
              {dos.map((d, i) => (
                <div key={i} style={{ display: "flex", gap: 12, padding: "10px 0", borderBottom: `1px solid ${S.faint}` }}>
                  <span style={{ color: C.light, flexShrink: 0, fontSize: 14 }}>✓</span>
                  <span style={{ fontSize: 12.5, color: S.muted, lineHeight: 1.55 }}>{d}</span>
                </div>
              ))}
            </div>

            <SectionLabel>Never Do These</SectionLabel>
            <div style={{ marginBottom: 28 }}>
              {donts.map((d, i) => (
                <div key={i} style={{ display: "flex", gap: 12, padding: "10px 0", borderBottom: `1px solid ${S.faint}` }}>
                  <span style={{ color: S.muted, flexShrink: 0, fontSize: 14 }}>✗</span>
                  <span style={{ fontSize: 12.5, color: S.muted, lineHeight: 1.55 }}>{d}</span>
                </div>
              ))}
            </div>

            <Divider />

            <SectionLabel>Sleep Fix — In Order of Impact</SectionLabel>
            <div style={{ background: S.surface2, border: `1px solid ${S.border}`, borderRadius: 10, padding: 16, marginBottom: 16 }}>
              <div style={{ fontSize: 13, color: C.text, lineHeight: 1.7 }}>
                <strong style={{ color: C.light }}>The diagnosis:</strong> Waking groggy after 7–9 hours = enough time, wrong architecture. Most likely culprits: inconsistent wake time (circadian drift) + no morning light anchor.
              </div>
            </div>
            {sleepFix.map(s => (
              <div key={s.n} style={{ background: S.surface1, border: `1px solid ${S.border}`, borderRadius: 10, padding: 16, marginBottom: 10 }}>
                <div style={{ display: "flex", gap: 14 }}>
                  <div style={{
                    background: C.accent, color: C.text,
                    width: 30, height: 30, borderRadius: "50%",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 12, fontWeight: 700, flexShrink: 0, fontFamily: fontBody,
                  }}>{s.n}</div>
                  <div>
                    <div style={{ fontFamily: fontHead, fontSize: 14.5, fontWeight: 700, marginBottom: 6, color: C.text }}>{s.title}</div>
                    <div style={{ fontSize: 12, color: S.muted, lineHeight: 1.6 }}>{s.desc}</div>
                  </div>
                </div>
              </div>
            ))}
          </>
        )}
      </div>

      {/* Footer */}
      <div style={{
        padding: "20px 16px", borderTop: `1px solid ${S.faint}`,
        textAlign: "center", color: S.dim, fontSize: 10.5,
        letterSpacing: "1.5px",
      }}>
        PRIME BY 20 · HOLD UNTIL 90
      </div>
    </div>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
